<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<defs>
<radialGradient id="skybg" cx="50%" cy="0%" r="100%">
<stop offset="0%" stop-color="#ffeb3b"/>
<stop offset="40%" stop-color="#42a5f5"/>
<stop offset="100%" stop-color="#1565c0"/>
</radialGradient>
</defs>
<rect width="400" height="300" fill="url(#skybg)"/>
<!-- Sun rays from top -->
<g opacity="0.4" stroke="#fff" stroke-width="2">
<line x1="200" y1="0" x2="180" y2="60"/>
<line x1="200" y1="0" x2="220" y2="60"/>
<line x1="200" y1="0" x2="140" y2="50"/>
<line x1="200" y1="0" x2="260" y2="50"/>
<line x1="200" y1="0" x2="100" y2="40"/>
<line x1="200" y1="0" x2="300" y2="40"/>
</g>
<!-- Sparkles -->
<text x="60" y="30" font-size="14" fill="#fff">✨</text>
<text x="340" y="40" font-size="12" fill="#fff">✨</text>
<text x="80" y="220" font-size="10" fill="#fff">✦</text>
<text x="320" y="240" font-size="14" fill="#fff">✨</text>
<!-- LEFT TOILET -->
<g transform="translate(80,140)">
<!-- Toilet base -->
<rect x="-25" y="80" width="50" height="50" rx="6" fill="#fff" stroke="#666" stroke-width="2"/>
<rect x="-15" y="60" width="30" height="22" rx="3" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
<ellipse cx="0" cy="80" rx="22" ry="8" fill="#1a1a1a"/>
<!-- Skibidi head -->
<ellipse cx="0" cy="40" rx="32" ry="38" fill="#ff7043" stroke="#d84315" stroke-width="3"/>
<!-- Eyes -->
<circle cx="-12" cy="35" r="8" fill="#fff7d6" stroke="#1a1a1a" stroke-width="2"/>
<circle cx="12" cy="35" r="8" fill="#fff7d6" stroke="#1a1a1a" stroke-width="2"/>
<polygon points="-12,33 -8,32 -10,38" fill="#1a1a1a"/>
<polygon points="12,33 8,32 10,38" fill="#1a1a1a"/>
<!-- Mouth (singing/yelling pose) -->
<ellipse cx="0" cy="55" rx="10" ry="8" fill="#1a1a1a"/>
<ellipse cx="0" cy="56" rx="6" ry="3" fill="#fff"/>
</g>
<!-- RIGHT TOILET -->
<g transform="translate(290,160)">
<rect x="-30" y="80" width="60" height="60" rx="6" fill="#fff" stroke="#666" stroke-width="2"/>
<rect x="-18" y="55" width="36" height="28" rx="3" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
<ellipse cx="0" cy="82" rx="26" ry="9" fill="#1a1a1a"/>
<!-- Bigger skibidi head with mustache -->
<ellipse cx="0" cy="35" rx="38" ry="44" fill="#ff7043" stroke="#d84315" stroke-width="3"/>
<!-- Yellow rays inside (energy) -->
<polygon points="0,-3 -4,12 4,12" fill="#fbbf24" opacity="0.5"/>
<polygon points="-15,-2 -18,8 -10,10" fill="#fbbf24" opacity="0.5"/>
<polygon points="15,-2 18,8 10,10" fill="#fbbf24" opacity="0.5"/>
<!-- Eyes -->
<circle cx="-14" cy="30" r="9" fill="#fff7d6" stroke="#1a1a1a" stroke-width="2"/>
<circle cx="14" cy="30" r="9" fill="#fff7d6" stroke="#1a1a1a" stroke-width="2"/>
<text x="-14" y="34" font-family="Arial Black" font-size="14" font-weight="900" fill="#fbbf24" text-anchor="middle">★</text>
<text x="14" y="34" font-family="Arial Black" font-size="14" font-weight="900" fill="#fbbf24" text-anchor="middle">★</text>
<!-- Big open mouth -->
<ellipse cx="0" cy="52" rx="14" ry="10" fill="#1a1a1a"/>
<ellipse cx="0" cy="54" rx="9" ry="4" fill="#a855f7"/>
</g>
<!-- HUD score -->
<rect x="10" y="10" width="80" height="32" rx="6" fill="rgba(0,0,0,0.5)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="50" y="30" font-family="Arial Black" font-size="14" font-weight="900" fill="#fbbf24" text-anchor="middle">+10</text>
<rect x="310" y="10" width="80" height="32" rx="6" fill="rgba(0,0,0,0.5)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="350" y="30" font-family="Arial Black" font-size="14" font-weight="900" fill="#fff" text-anchor="middle">⏱ 42</text>
<!-- Title -->
<text x="200" y="288" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="#fbbf24" stroke="#d84315" stroke-width="3" paint-order="stroke" text-anchor="middle">SKIBIDI TOILET</text>
</svg>
