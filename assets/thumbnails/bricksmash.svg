<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#0a0e2e"/>
<stop offset="1" stop-color="#1a2e5e"/>
</linearGradient>
<radialGradient id="ball" cx="0.35" cy="0.35" r="0.7">
<stop offset="0" stop-color="#fff"/>
<stop offset="1" stop-color="#00ffff"/>
</radialGradient>
<linearGradient id="paddle" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#99ffff"/>
<stop offset="0.5" stop-color="#00ffff"/>
<stop offset="1" stop-color="#0066aa"/>
</linearGradient>
</defs>
<rect width="400" height="300" fill="url(#bg)"/>
<!-- bricks grid -->
<g stroke="#000" stroke-width="2">
<rect x="30" y="40" width="50" height="22" fill="#ff3366"/>
<rect x="85" y="40" width="50" height="22" fill="#ff3366"/>
<rect x="140" y="40" width="50" height="22" fill="#ff3366"/>
<rect x="195" y="40" width="50" height="22" fill="#ff3366"/>
<rect x="250" y="40" width="50" height="22" fill="#ff3366"/>
<rect x="305" y="40" width="50" height="22" fill="#ff3366"/>
<rect x="30" y="66" width="50" height="22" fill="#ff9500"/>
<rect x="85" y="66" width="50" height="22" fill="#ff9500"/>
<rect x="140" y="66" width="50" height="22" fill="#ff9500"/>
<rect x="195" y="66" width="50" height="22" fill="#ff9500"/>
<rect x="250" y="66" width="50" height="22" fill="#ff9500"/>
<rect x="305" y="66" width="50" height="22" fill="#ff9500"/>
<rect x="30" y="92" width="50" height="22" fill="#ffd700"/>
<rect x="85" y="92" width="50" height="22" fill="#ffd700"/>
<rect x="140" y="92" width="50" height="22" fill="#ffd700"/>
<rect x="250" y="92" width="50" height="22" fill="#ffd700"/>
<rect x="305" y="92" width="50" height="22" fill="#ffd700"/>
<rect x="30" y="118" width="50" height="22" fill="#00ff88"/>
<rect x="85" y="118" width="50" height="22" fill="#00ff88"/>
<rect x="305" y="118" width="50" height="22" fill="#00ff88"/>
</g>
<!-- highlight lines on bricks -->
<g fill="rgba(255,255,255,0.3)">
<rect x="32" y="42" width="46" height="3"/>
<rect x="87" y="42" width="46" height="3"/>
<rect x="142" y="42" width="46" height="3"/>
<rect x="197" y="42" width="46" height="3"/>
<rect x="252" y="42" width="46" height="3"/>
<rect x="307" y="42" width="46" height="3"/>
</g>
<!-- ball -->
<circle cx="200" cy="165" r="10" fill="url(#ball)" filter="url(#glow)"/>
<!-- paddle -->
<rect x="145" y="220" width="110" height="14" rx="7" fill="url(#paddle)" stroke="#000" stroke-width="2"/>
<g font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle">
<text x="200" y="275" font-size="34" fill="#00ffff" stroke="#000" stroke-width="4" paint-order="stroke">BRICK SMASH</text>
</g>
</svg>
