<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#06b6d4"/>
<stop offset="100%" stop-color="#0e7490"/>
</linearGradient>
</defs>
<rect width="400" height="300" fill="url(#sea)"/>
<!-- waves -->
<g stroke="#fff" stroke-width="1" opacity="0.3" fill="none">
<path d="M 0,40 Q 50,35 100,40 T 200,40 T 300,40 T 400,40"/>
<path d="M 0,80 Q 50,75 100,80 T 200,80 T 300,80 T 400,80"/>
<path d="M 0,120 Q 50,115 100,120 T 200,120 T 300,120 T 400,120"/>
</g>
<!-- speed lines -->
<g stroke="#fff" stroke-width="2" opacity="0.5">
<line x1="40" y1="40" x2="20" y2="60"/>
<line x1="360" y1="40" x2="380" y2="60"/>
<line x1="50" y1="100" x2="30" y2="120"/>
<line x1="350" y1="100" x2="370" y2="120"/>
</g>
<!-- obstacles ahead -->
<polygon points="120,80 140,100 130,120 110,110" fill="#475569"/>
<rect x="270" y="90" width="40" height="14" fill="#92400e" rx="3"/>
<rect x="200" y="60" width="6" height="6" fill="#fbbf24" transform="rotate(45 203 63)"/>
<circle cx="280" cy="60" r="8" fill="#fbbf24"/>
<text x="280" y="65" font-family="Arial Black" font-size="10" font-weight="900" fill="#92400e" text-anchor="middle">$</text>
<!-- speedboat -->
<g transform="translate(180,180)">
<polygon points="0,0 40,0 50,30 -10,30" fill="#dc2626"/>
<polygon points="5,5 35,5 38,18 2,18" fill="#fff"/>
<rect x="13" y="8" width="14" height="8" fill="#0ea5e9"/>
<!-- wake -->
<polygon points="-10,30 -30,55 50,55 50,30" fill="#fff" opacity="0.6"/>
<polygon points="-15,55 -35,80 55,80 50,55" fill="#fff" opacity="0.3"/>
</g>
<!-- HUD -->
<rect x="10" y="10" width="120" height="28" rx="6" fill="rgba(0,0,0,0.6)"/>
<text x="70" y="29" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#fbbf24" text-anchor="middle">DIST 1.2 KM</text>
<rect x="270" y="10" width="120" height="28" rx="6" fill="rgba(0,0,0,0.6)"/>
<text x="330" y="29" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#fff" text-anchor="middle">♥♥♥ ★ 24</text>
<!-- title -->
<text x="200" y="285" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#fff" stroke="#000" stroke-width="2" paint-order="stroke" text-anchor="middle">SPEED BOAT</text>
</svg>
