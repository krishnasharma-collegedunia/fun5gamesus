<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0d33"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="snake" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cc99ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g fill="#1e1e1e">
    <circle cx="60" cy="60" r="2"/><circle cx="140" cy="60" r="2"/><circle cx="220" cy="60" r="2"/><circle cx="300" cy="60" r="2"/><circle cx="380" cy="60" r="2"/>
    <circle cx="60" cy="140" r="2"/><circle cx="380" cy="140" r="2"/>
    <circle cx="60" cy="220" r="2"/><circle cx="380" cy="220" r="2"/>
    <circle cx="60" cy="300" r="2"/><circle cx="380" cy="300" r="2"/>
    <circle cx="60" cy="380" r="2"/><circle cx="140" cy="380" r="2"/><circle cx="220" cy="380" r="2"/><circle cx="300" cy="380" r="2"/><circle cx="380" cy="380" r="2"/>
  </g>
  <!-- Snake body -->
  <g fill="url(#snake)">
    <rect x="90" y="130" width="36" height="36" rx="6"/>
    <rect x="130" y="130" width="36" height="36" rx="6"/>
    <rect x="170" y="130" width="36" height="36" rx="6"/>
    <rect x="170" y="170" width="36" height="36" rx="6"/>
    <rect x="170" y="210" width="36" height="36" rx="6"/>
    <rect x="210" y="210" width="36" height="36" rx="6"/>
    <rect x="250" y="210" width="36" height="36" rx="6"/>
    <rect x="250" y="250" width="36" height="36" rx="6"/>
  </g>
  <!-- Head with eyes -->
  <rect x="50" y="130" width="36" height="36" rx="8" fill="#e9d5ff"/>
  <circle cx="62" cy="142" r="3" fill="#0d0d0d"/>
  <circle cx="78" cy="142" r="3" fill="#0d0d0d"/>
  <!-- Food apple -->
  <circle cx="310" cy="160" r="14" fill="#ef4444"/>
  <path d="M310 146 Q314 142 318 148" stroke="#16a34a" stroke-width="3" fill="none"/>
  <!-- Title -->
  <text x="200" y="350" text-anchor="middle" fill="#cc99ff" font-family="Courier New,monospace" font-size="38" font-weight="bold">SNAKE.GO</text>
</svg>
