<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#60a5fa"/>
<stop offset="100%" stop-color="#3b82f6"/>
</linearGradient>
<linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#22c55e"/>
<stop offset="100%" stop-color="#16a34a"/>
</linearGradient>
</defs>
<!-- sky -->
<rect width="400" height="180" fill="url(#sky)"/>
<!-- grass -->
<rect y="180" width="400" height="120" fill="url(#grass)"/>
<!-- field stripes -->
<rect y="200" width="400" height="20" fill="#16a34a" opacity="0.4"/>
<rect y="240" width="400" height="20" fill="#16a34a" opacity="0.4"/>
<!-- goal posts -->
<rect x="100" y="80" width="6" height="120" fill="#fff"/>
<rect x="294" y="80" width="6" height="120" fill="#fff"/>
<rect x="100" y="80" width="200" height="6" fill="#fff"/>
<!-- net pattern -->
<g stroke="#fff" stroke-width="1" opacity="0.5" fill="none">
<line x1="115" y1="86" x2="115" y2="200"/>
<line x1="135" y1="86" x2="135" y2="200"/>
<line x1="160" y1="86" x2="160" y2="200"/>
<line x1="200" y1="86" x2="200" y2="200"/>
<line x1="240" y1="86" x2="240" y2="200"/>
<line x1="265" y1="86" x2="265" y2="200"/>
<line x1="285" y1="86" x2="285" y2="200"/>
<line x1="106" y1="100" x2="294" y2="100"/>
<line x1="106" y1="125" x2="294" y2="125"/>
<line x1="106" y1="150" x2="294" y2="150"/>
<line x1="106" y1="175" x2="294" y2="175"/>
</g>
<!-- goalkeeper -->
<g>
<!-- body -->
<rect x="180" y="145" width="40" height="50" rx="6" fill="#dc2626"/>
<text x="200" y="178" font-family="Arial Black" font-size="16" font-weight="900" fill="#fff" text-anchor="middle">1</text>
<!-- shorts -->
<rect x="180" y="195" width="40" height="20" fill="#1e293b"/>
<!-- head -->
<circle cx="200" cy="135" r="12" fill="#fbbf24"/>
<!-- arms (diving) -->
<rect x="155" y="155" width="30" height="9" rx="4" fill="#dc2626" transform="rotate(-15 170 159)"/>
<rect x="215" y="155" width="30" height="9" rx="4" fill="#dc2626" transform="rotate(15 230 159)"/>
<!-- gloves -->
<circle cx="155" cy="160" r="7" fill="#fff"/>
<circle cx="245" cy="160" r="7" fill="#fff"/>
</g>
<!-- ball flying toward goal -->
<g>
<circle cx="240" cy="125" r="11" fill="#fff" stroke="#222" stroke-width="1"/>
<polygon points="240,118 246,123 244,128 236,128 234,123" fill="#222"/>
<!-- trail -->
<circle cx="265" cy="135" r="9" fill="#fff" opacity="0.5"/>
<circle cx="290" cy="145" r="7" fill="#fff" opacity="0.3"/>
</g>
<!-- score -->
<rect x="20" y="20" width="80" height="32" rx="6" fill="rgba(0,0,0,0.6)"/>
<text x="60" y="42" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#fff" text-anchor="middle">SAVES: 8</text>
<!-- title -->
<text x="200" y="285" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#fff" stroke="#000" stroke-width="3" paint-order="stroke" text-anchor="middle">GOAL KEEPER</text>
</svg>
