<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<defs>
<radialGradient id="ghbg" cx="50%" cy="50%" r="70%">
<stop offset="0%" stop-color="#1e1b4b"/>
<stop offset="100%" stop-color="#0a0a1a"/>
</radialGradient>
<radialGradient id="hole" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#000"/>
<stop offset="60%" stop-color="#1e1b4b"/>
<stop offset="100%" stop-color="#7c3aed"/>
</radialGradient>
</defs>
<rect width="400" height="300" fill="url(#ghbg)"/>
<!-- stars -->
<g fill="#fff">
<circle cx="40" cy="40" r="1.5"/><circle cx="80" cy="60" r="1"/><circle cx="120" cy="30" r="1.5"/>
<circle cx="320" cy="50" r="1"/><circle cx="360" cy="80" r="1.5"/><circle cx="60" cy="200" r="1"/>
<circle cx="100" cy="240" r="1.5"/><circle cx="340" cy="220" r="1"/><circle cx="380" cy="180" r="1.5"/>
<circle cx="20" cy="120" r="1"/><circle cx="370" cy="140" r="1"/>
</g>
<!-- objects being consumed -->
<rect x="60" y="80" width="20" height="20" fill="#3b82f6" opacity="0.7" transform="rotate(15 70 90)"/>
<rect x="320" y="100" width="22" height="22" fill="#10b981" opacity="0.6" transform="rotate(-20 331 111)"/>
<circle cx="80" cy="200" r="10" fill="#f59e0b" opacity="0.7"/>
<rect x="310" y="220" width="18" height="18" fill="#ec4899" opacity="0.7" transform="rotate(25 319 229)"/>
<polygon points="50,140 60,150 50,160 40,150" fill="#06b6d4" opacity="0.7"/>
<!-- swirl trails -->
<path d="M 100,90 Q 150,120 180,140" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="3,3"/>
<path d="M 300,110 Q 250,130 220,150" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="3,3"/>
<!-- black hole center -->
<circle cx="200" cy="150" r="60" fill="url(#hole)"/>
<circle cx="200" cy="150" r="40" fill="#000"/>
<circle cx="200" cy="150" r="60" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.8"/>
<circle cx="200" cy="150" r="68" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
<!-- swirl effect -->
<g opacity="0.6">
<ellipse cx="200" cy="150" rx="55" ry="20" fill="none" stroke="#a855f7" stroke-width="2" transform="rotate(20 200 150)"/>
<ellipse cx="200" cy="150" rx="58" ry="15" fill="none" stroke="#06b6d4" stroke-width="1.5" transform="rotate(-15 200 150)"/>
</g>
<text x="200" y="280" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="#a855f7" text-anchor="middle">GALAXY HOLE</text>
</svg>
