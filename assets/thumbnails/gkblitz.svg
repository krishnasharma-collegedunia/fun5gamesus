<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="gkbg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#1a1a3a"/>
<stop offset="100%" stop-color="#3a1a5a"/>
</linearGradient>
</defs>
<rect width="400" height="300" fill="url(#gkbg)"/>
<!-- Top header bar -->
<rect x="20" y="20" width="360" height="30" rx="4" fill="rgba(255,215,0,0.08)"/>
<text x="30" y="40" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#ffd700">Q 3/10</text>
<text x="200" y="40" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">⏱ 08s</text>
<text x="370" y="40" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#22c55e" text-anchor="end">+2</text>
<!-- Category badge -->
<rect x="150" y="60" width="100" height="22" rx="11" fill="rgba(255,215,0,0.15)" stroke="#ffd700" stroke-width="1"/>
<text x="200" y="76" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffd700" text-anchor="middle">POLITY</text>
<!-- Question -->
<text x="200" y="110" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">Who was the first</text>
<text x="200" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">President of India?</text>
<!-- Options -->
<g font-family="Arial, sans-serif">
<rect x="50" y="150" width="300" height="30" rx="6" fill="#22c55e"/>
<text x="65" y="170" font-size="11" font-weight="900" fill="#fff">A</text>
<text x="200" y="170" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Dr. Rajendra Prasad ✓</text>
<rect x="50" y="186" width="300" height="28" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
<text x="65" y="205" font-size="11" font-weight="900" fill="#ffd700">B</text>
<text x="200" y="205" font-size="13" fill="#fff" text-anchor="middle">Jawaharlal Nehru</text>
<rect x="50" y="220" width="300" height="28" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
<text x="65" y="239" font-size="11" font-weight="900" fill="#ffd700">C</text>
<text x="200" y="239" font-size="13" fill="#fff" text-anchor="middle">Sardar Vallabhbhai Patel</text>
</g>
<!-- Title -->
<text x="200" y="283" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="#ffd700" text-anchor="middle">GK BLITZ</text>
</svg>
