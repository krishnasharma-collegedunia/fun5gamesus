<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<rect width="400" height="300" fill="#f5f3ef"/>
<!-- 9x9 grid, centered -->
<g font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" font-size="18">
<!-- Grid background -->
<rect x="110" y="25" width="180" height="180" fill="#fff" stroke="#222" stroke-width="3"/>
<!-- thin cell lines -->
<g stroke="#ccc" stroke-width="1">
<line x1="130" y1="25" x2="130" y2="205"/>
<line x1="150" y1="25" x2="150" y2="205"/>
<line x1="190" y1="25" x2="190" y2="205"/>
<line x1="210" y1="25" x2="210" y2="205"/>
<line x1="250" y1="25" x2="250" y2="205"/>
<line x1="270" y1="25" x2="270" y2="205"/>
<line x1="110" y1="45" x2="290" y2="45"/>
<line x1="110" y1="65" x2="290" y2="65"/>
<line x1="110" y1="105" x2="290" y2="105"/>
<line x1="110" y1="125" x2="290" y2="125"/>
<line x1="110" y1="165" x2="290" y2="165"/>
<line x1="110" y1="185" x2="290" y2="185"/>
</g>
<!-- bold 3x3 block lines -->
<g stroke="#222" stroke-width="2.5">
<line x1="170" y1="25" x2="170" y2="205"/>
<line x1="230" y1="25" x2="230" y2="205"/>
<line x1="110" y1="85" x2="290" y2="85"/>
<line x1="110" y1="145" x2="290" y2="145"/>
</g>
<!-- Highlighted cell (selected) -->
<rect x="190" y="85" width="20" height="20" fill="#bfdbfe"/>
<!-- Sample numbers - clues in dark -->
<g fill="#222">
<text x="120" y="42">5</text>
<text x="160" y="42">3</text>
<text x="240" y="42">7</text>
<text x="140" y="62">6</text>
<text x="200" y="62">1</text>
<text x="220" y="62">9</text>
<text x="240" y="62">5</text>
<text x="120" y="82">9</text>
<text x="160" y="82">8</text>
<text x="280" y="82">6</text>
<text x="120" y="102">8</text>
<text x="180" y="102">6</text>
<text x="260" y="102">3</text>
<text x="120" y="122">4</text>
<text x="160" y="122">8</text>
<text x="220" y="122">3</text>
<text x="280" y="122">1</text>
<text x="120" y="142">7</text>
<text x="180" y="142">2</text>
<text x="260" y="142">6</text>
<text x="140" y="162">6</text>
<text x="200" y="162">2</text>
<text x="220" y="162">8</text>
<text x="240" y="162">4</text>
<text x="160" y="182">1</text>
<text x="220" y="182">9</text>
<text x="260" y="182">5</text>
<text x="140" y="202">8</text>
</g>
<!-- Player input in blue -->
<g fill="#2563eb">
<text x="200" y="102">4</text>
<text x="120" y="162">3</text>
</g>
</g>
<!-- Number pad mini preview -->
<g font-family="Arial Black, sans-serif" font-size="13" font-weight="900" text-anchor="middle">
<rect x="110" y="220" width="26" height="26" rx="3" fill="#e5e7eb"/>
<text x="123" y="238" fill="#222">1</text>
<rect x="140" y="220" width="26" height="26" rx="3" fill="#e5e7eb"/>
<text x="153" y="238" fill="#222">2</text>
<rect x="170" y="220" width="26" height="26" rx="3" fill="#2563eb"/>
<text x="183" y="238" fill="#fff">3</text>
<rect x="200" y="220" width="26" height="26" rx="3" fill="#e5e7eb"/>
<text x="213" y="238" fill="#222">4</text>
<rect x="230" y="220" width="26" height="26" rx="3" fill="#e5e7eb"/>
<text x="243" y="238" fill="#222">5</text>
<rect x="260" y="220" width="26" height="26" rx="3" fill="#e5e7eb"/>
<text x="273" y="238" fill="#222">6</text>
</g>
<!-- Title -->
<text x="200" y="280" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#2563eb" text-anchor="middle">SUDOKU PRO</text>
</svg>
