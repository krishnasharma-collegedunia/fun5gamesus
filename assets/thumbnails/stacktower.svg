<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1a0533"/>
<stop offset="100%" stop-color="#4a1a7a"/>
</linearGradient>
</defs>
<rect width="400" height="300" fill="url(#sky)"/>
<!-- stars -->
<circle cx="50" cy="30" r="1.5" fill="#fff"/>
<circle cx="120" cy="55" r="1" fill="#fff"/>
<circle cx="310" cy="25" r="1.5" fill="#fff"/>
<circle cx="360" cy="70" r="1" fill="#fff"/>
<circle cx="80" cy="80" r="1" fill="#fff"/>
<!-- stacked blocks (isometric look) -->
<g transform="translate(200,240)">
<!-- block 1 bottom -->
<polygon points="-60,0 0,-25 60,0 0,25" fill="#e74c3c"/>
<polygon points="-60,0 -60,-18 0,-43 0,-25" fill="#c0392b"/>
<polygon points="0,-25 0,-43 60,-18 60,0" fill="#d63031"/>
<!-- block 2 -->
<polygon points="-55,-30 0,-55 55,-30 0,-5" fill="#f39c12"/>
<polygon points="-55,-30 -55,-48 0,-73 0,-55" fill="#d68910"/>
<polygon points="0,-55 0,-73 55,-48 55,-30" fill="#e67e22"/>
<!-- block 3 -->
<polygon points="-50,-60 0,-85 50,-60 0,-35" fill="#2ecc71"/>
<polygon points="-50,-60 -50,-78 0,-103 0,-85" fill="#27ae60"/>
<polygon points="0,-85 0,-103 50,-78 50,-60" fill="#1abc9c"/>
<!-- block 4 -->
<polygon points="-44,-90 0,-112 44,-90 0,-68" fill="#3498db"/>
<polygon points="-44,-90 -44,-108 0,-130 0,-112" fill="#2980b9"/>
<polygon points="0,-112 0,-130 44,-108 44,-90" fill="#2471a3"/>
<!-- moving block -->
<polygon points="-40,-120 0,-142 40,-120 0,-98" fill="#e74c3c" opacity="0.8"/>
<polygon points="-40,-120 -40,-138 0,-160 0,-142" fill="#c0392b" opacity="0.8"/>
<polygon points="0,-142 0,-160 40,-138 40,-120" fill="#d63031" opacity="0.8"/>
</g>
<!-- title -->
<text x="200" y="285" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#f1c40f" text-anchor="middle">STACK TOWER</text>
</svg>
