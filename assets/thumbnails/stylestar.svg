<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="ssbg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#fce7f3"/>
<stop offset="100%" stop-color="#f5d0fe"/>
</linearGradient>
</defs>
<rect width="400" height="300" fill="url(#ssbg)"/>
<!-- theme card top -->
<rect x="100" y="20" width="200" height="38" rx="19" fill="#ec4899"/>
<text x="200" y="45" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#fff" text-anchor="middle">★ BEACH PARTY ★</text>
<!-- character silhouette -->
<g transform="translate(180,75)">
<!-- hair -->
<ellipse cx="20" cy="15" rx="22" ry="20" fill="#ca8a04"/>
<!-- head -->
<circle cx="20" cy="22" r="14" fill="#fde68a"/>
<!-- top (sun hat accessory) -->
<ellipse cx="20" cy="6" rx="28" ry="6" fill="#f59e0b"/>
<rect x="14" y="2" width="12" height="6" fill="#f59e0b" rx="2"/>
<!-- top body (bikini/casual) -->
<polygon points="0,40 40,40 38,80 2,80" fill="#ec4899"/>
<!-- shorts -->
<polygon points="2,80 38,80 36,115 22,115 22,100 18,100 18,115 4,115" fill="#0ea5e9"/>
<!-- legs -->
<rect x="6" y="115" width="10" height="40" fill="#fde68a"/>
<rect x="24" y="115" width="10" height="40" fill="#fde68a"/>
<!-- sandals -->
<rect x="4" y="155" width="14" height="6" fill="#92400e" rx="2"/>
<rect x="22" y="155" width="14" height="6" fill="#92400e" rx="2"/>
</g>
<!-- swatch panel bottom -->
<rect x="20" y="240" width="360" height="50" rx="10" fill="#fff" stroke="#fbcfe8" stroke-width="2"/>
<g>
<rect x="30" y="248" width="30" height="34" rx="6" fill="#dc2626"/>
<rect x="68" y="248" width="30" height="34" rx="6" fill="#0ea5e9" stroke="#ec4899" stroke-width="2"/>
<rect x="106" y="248" width="30" height="34" rx="6" fill="#22c55e"/>
<rect x="144" y="248" width="30" height="34" rx="6" fill="#f59e0b"/>
<rect x="182" y="248" width="30" height="34" rx="6" fill="#a855f7"/>
<rect x="220" y="248" width="30" height="34" rx="6" fill="#fbbf24"/>
<rect x="258" y="248" width="30" height="34" rx="6" fill="#ec4899"/>
<rect x="296" y="248" width="30" height="34" rx="6" fill="#06b6d4"/>
<rect x="334" y="248" width="30" height="34" rx="6" fill="#000"/>
</g>
<!-- score -->
<rect x="20" y="20" width="60" height="32" rx="6" fill="#a855f7"/>
<text x="50" y="42" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#fff" text-anchor="middle">★ 4/5</text>
<!-- sparkles -->
<text x="60" y="100" font-size="20" fill="#fbbf24">✨</text>
<text x="320" y="120" font-size="22" fill="#fbbf24">✨</text>
<text x="350" y="180" font-size="18" fill="#fbbf24">✨</text>
<!-- title -->
<text x="200" y="232" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#a855f7" text-anchor="middle">STYLE STAR</text>
</svg>
