<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<rect width="400" height="300" fill="#f0f9ff"/>
<g font-family="Arial, sans-serif" text-anchor="middle">
<text x="200" y="30" font-size="13" font-weight="700" fill="#0369a1" letter-spacing="2">DATA INTERPRETATION</text>
<rect x="30" y="45" width="340" height="160" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
<text x="200" y="68" font-size="12" font-weight="700" fill="#0f172a">SALES BY PRODUCT (2020-2023)</text>
<!-- Bar chart -->
<line x1="55" y1="180" x2="355" y2="180" stroke="#94a3b8" stroke-width="1"/>
<line x1="55" y1="90" x2="55" y2="180" stroke="#94a3b8" stroke-width="1"/>
<rect x="80" y="140" width="40" height="40" fill="#3b82f6"/>
<text x="100" y="195" font-size="10" fill="#475569">2020</text>
<rect x="140" y="125" width="40" height="55" fill="#6366f1"/>
<text x="160" y="195" font-size="10" fill="#475569">2021</text>
<rect x="200" y="105" width="40" height="75" fill="#8b5cf6"/>
<text x="220" y="195" font-size="10" fill="#475569">2022</text>
<rect x="260" y="90" width="40" height="90" fill="#a855f7"/>
<text x="280" y="195" font-size="10" fill="#475569">2023</text>
<text x="55" y="100" font-size="9" fill="#94a3b8" text-anchor="end">200</text>
<text x="55" y="135" font-size="9" fill="#94a3b8" text-anchor="end">150</text>
<text x="55" y="180" font-size="9" fill="#94a3b8" text-anchor="end">100</text>
<rect x="30" y="215" width="340" height="40" rx="6" fill="#fef3c7"/>
<text x="200" y="235" font-size="12" font-weight="700" fill="#78350f">Q: By what % did sales grow</text>
<text x="200" y="250" font-size="12" font-weight="700" fill="#78350f">from 2020 to 2023?</text>
<text x="200" y="285" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="#0369a1">DI DRILL</text>
</g>
</svg>
