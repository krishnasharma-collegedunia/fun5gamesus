<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<rect width="400" height="300" fill="#0f172a"/>
<g font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle">
<rect x="30" y="25" width="340" height="5" rx="2" fill="#1e293b"/>
<rect x="30" y="25" width="240" height="5" rx="2" fill="#16a34a"/>
<text x="30" y="50" font-family="Arial, sans-serif" font-size="13" fill="#ffd700" text-anchor="start" font-weight="900">⏱ 42s</text>
<text x="370" y="50" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="end" font-weight="900">SCORE: 18</text>
<rect x="30" y="65" width="340" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
<text x="200" y="115" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">The Taj Mahal was built</text>
<text x="200" y="138" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">by Shah Jahan.</text>
<text x="200" y="160" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#94a3b8">True or False?</text>
<rect x="30" y="190" width="160" height="70" rx="12" fill="#16a34a"/>
<text x="110" y="225" font-size="22" fill="#fff">✓</text>
<text x="110" y="248" font-size="16" fill="#fff">TRUE</text>
<rect x="210" y="190" width="160" height="70" rx="12" fill="#dc2626" opacity="0.4"/>
<text x="290" y="225" font-size="22" fill="#fff">✗</text>
<text x="290" y="248" font-size="16" fill="#fff">FALSE</text>
<text x="200" y="290" font-size="28" fill="#ffd700">TRUE OR FALSE</text>
</g>
</svg>
