<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#1a0540"/>
<stop offset="1" stop-color="#4a1a7a"/>
</linearGradient>
<radialGradient id="coin" cx="0.35" cy="0.35" r="0.7">
<stop offset="0" stop-color="#fff3b0"/>
<stop offset="0.5" stop-color="#ffd700"/>
<stop offset="1" stop-color="#b8860b"/>
</radialGradient>
<radialGradient id="gem" cx="0.4" cy="0.35" r="0.7">
<stop offset="0" stop-color="#c5fffa"/>
<stop offset="0.6" stop-color="#00d9ff"/>
<stop offset="1" stop-color="#004d66"/>
</radialGradient>
<linearGradient id="basket" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#ffb300"/>
<stop offset="1" stop-color="#cc6600"/>
</linearGradient>
</defs>
<rect width="400" height="300" fill="url(#bg)"/>
<!-- stars -->
<g fill="#fff">
<circle cx="40" cy="40" r="1.5"/>
<circle cx="100" cy="70" r="1"/>
<circle cx="180" cy="30" r="1.5"/>
<circle cx="260" cy="50" r="1"/>
<circle cx="340" cy="35" r="1.5"/>
<circle cx="370" cy="100" r="1"/>
<circle cx="60" cy="120" r="1"/>
<circle cx="250" cy="140" r="1.5"/>
</g>
<!-- falling coins -->
<g stroke="#000" stroke-width="2.5">
<circle cx="100" cy="130" r="22" fill="url(#coin)"/>
<text x="100" y="138" font-family="Arial Black" font-size="24" font-weight="900" text-anchor="middle" fill="#b8860b">$</text>
<circle cx="280" cy="100" r="20" fill="url(#coin)"/>
<text x="280" y="107" font-family="Arial Black" font-size="22" font-weight="900" text-anchor="middle" fill="#b8860b">$</text>
<polygon points="200,60 220,95 200,145 180,95" fill="url(#gem)"/>
<circle cx="320" cy="170" r="18" fill="url(#coin)"/>
<text x="320" y="177" font-family="Arial Black" font-size="20" font-weight="900" text-anchor="middle" fill="#b8860b">$</text>
</g>
<!-- basket -->
<g stroke="#000" stroke-width="3" transform="translate(175,200)">
<path d="M -40 0 L 40 0 L 32 40 L -32 40 Z" fill="url(#basket)"/>
<line x1="-30" y1="10" x2="-25" y2="35" stroke="#8b4513" stroke-width="2"/>
<line x1="-15" y1="5" x2="-13" y2="35" stroke="#8b4513" stroke-width="2"/>
<line x1="0" y1="5" x2="0" y2="38" stroke="#8b4513" stroke-width="2"/>
<line x1="15" y1="5" x2="13" y2="35" stroke="#8b4513" stroke-width="2"/>
<line x1="30" y1="10" x2="25" y2="35" stroke="#8b4513" stroke-width="2"/>
</g>
<g font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle">
<text x="200" y="275" font-size="32" fill="#ffd700" stroke="#000" stroke-width="4" paint-order="stroke">COIN CATCHER</text>
</g>
</svg>
