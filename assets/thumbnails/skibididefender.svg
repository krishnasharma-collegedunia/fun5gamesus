<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="sdsky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#7c3aed"/>
<stop offset="100%" stop-color="#a78bfa"/>
</linearGradient>
</defs>
<rect width="400" height="220" fill="url(#sdsky)"/>
<rect y="220" width="400" height="80" fill="#22c55e"/>
<rect y="280" width="400" height="20" fill="#16a34a"/>
<!-- clouds -->
<ellipse cx="80" cy="60" rx="22" ry="10" fill="#fff" opacity="0.7"/>
<ellipse cx="320" cy="80" rx="28" ry="12" fill="#fff" opacity="0.7"/>
<!-- player (left) -->
<g>
<rect x="40" y="180" width="20" height="35" fill="#16a34a"/>
<circle cx="50" cy="170" r="10" fill="#fbbf24"/>
<rect x="44" y="160" width="12" height="6" fill="#374151" rx="2"/>
<rect x="55" y="190" width="22" height="5" fill="#374151"/>
</g>
<!-- bullet trail -->
<line x1="75" y1="195" x2="180" y2="180" stroke="#fbbf24" stroke-width="3" opacity="0.8"/>
<circle cx="180" cy="180" r="3" fill="#fbbf24"/>
<!-- toilet enemies -->
<!-- small toilet -->
<g transform="translate(220,170)">
<rect x="0" y="0" width="35" height="40" fill="#fff" rx="4" stroke="#94a3b8"/>
<rect x="3" y="4" width="29" height="6" fill="#0ea5e9" rx="2"/>
<circle cx="12" cy="22" r="2.5" fill="#000"/>
<circle cx="23" cy="22" r="2.5" fill="#000"/>
<path d="M 13,30 Q 17.5,33 22,30" stroke="#000" stroke-width="1.5" fill="none"/>
</g>
<!-- medium toilet -->
<g transform="translate(280,160)">
<rect x="0" y="0" width="42" height="50" fill="#fff" rx="4" stroke="#94a3b8"/>
<rect x="3" y="4" width="36" height="8" fill="#0ea5e9" rx="2"/>
<polygon points="11,25 15,21 17,25" fill="#000"/>
<polygon points="25,25 29,21 31,25" fill="#000"/>
<rect x="13" y="35" width="16" height="3" fill="#000"/>
</g>
<!-- big toilet with sunglasses -->
<g transform="translate(335,150)">
<rect x="0" y="0" width="50" height="60" fill="#fff" rx="5" stroke="#94a3b8"/>
<rect x="3" y="4" width="44" height="10" fill="#0ea5e9" rx="2"/>
<rect x="6" y="22" width="38" height="8" fill="#000" rx="2"/>
<rect x="14" y="40" width="22" height="4" fill="#000"/>
</g>
<!-- HUD -->
<rect x="10" y="10" width="100" height="28" rx="6" fill="rgba(0,0,0,0.7)"/>
<text x="60" y="29" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#fbbf24" text-anchor="middle">WAVE 5</text>
<rect x="290" y="10" width="100" height="28" rx="6" fill="rgba(0,0,0,0.7)"/>
<text x="340" y="29" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#fbbf24" text-anchor="middle">♥♥♥ 320</text>
<!-- title -->
<text x="200" y="285" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="#fff" stroke="#000" stroke-width="2" paint-order="stroke" text-anchor="middle">SKIBIDI DEFENDER</text>
</svg>
