<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
<!-- brick wall bg -->
<rect width="400" height="220" fill="#7c2d12"/>
<g fill="#92400e">
<rect x="0" y="0" width="40" height="20"/><rect x="80" y="0" width="40" height="20"/><rect x="160" y="0" width="40" height="20"/><rect x="240" y="0" width="40" height="20"/><rect x="320" y="0" width="40" height="20"/>
<rect x="20" y="20" width="40" height="20"/><rect x="100" y="20" width="40" height="20"/><rect x="180" y="20" width="40" height="20"/><rect x="260" y="20" width="40" height="20"/><rect x="340" y="20" width="40" height="20"/>
<rect x="0" y="40" width="40" height="20"/><rect x="80" y="40" width="40" height="20"/><rect x="160" y="40" width="40" height="20"/><rect x="240" y="40" width="40" height="20"/><rect x="320" y="40" width="40" height="20"/>
</g>
<!-- floor -->
<rect y="220" width="400" height="80" fill="#d97706"/>
<g stroke="#92400e" stroke-width="1" opacity="0.5">
<line x1="0" y1="240" x2="400" y2="240"/>
<line x1="0" y1="260" x2="400" y2="260"/>
<line x1="0" y1="280" x2="400" y2="280"/>
</g>
<!-- court arc -->
<path d="M 0,260 Q 200,220 400,260" stroke="#fff" stroke-width="2" fill="none"/>
<!-- backboard + hoop on right -->
<rect x="320" y="60" width="40" height="60" fill="#fff" stroke="#222" stroke-width="2"/>
<rect x="332" y="80" width="16" height="20" fill="#dc2626" stroke="#222" stroke-width="2"/>
<rect x="318" y="115" width="50" height="6" fill="#f97316" rx="2"/>
<!-- net -->
<g stroke="#fff" stroke-width="1" fill="none">
<line x1="320" y1="121" x2="324" y2="145"/>
<line x1="328" y1="121" x2="330" y2="145"/>
<line x1="336" y1="121" x2="336" y2="145"/>
<line x1="344" y1="121" x2="342" y2="145"/>
<line x1="352" y1="121" x2="348" y2="145"/>
<line x1="360" y1="121" x2="356" y2="145"/>
<line x1="368" y1="121" x2="362" y2="145"/>
</g>
<!-- pole -->
<rect x="338" y="121" width="4" height="100" fill="#374151"/>
<!-- ball with arc trajectory -->
<g stroke="#fbbf24" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.7">
<path d="M 80,220 Q 200,80 320,150"/>
</g>
<circle cx="200" cy="120" r="20" fill="#ea580c"/>
<g stroke="#7c2d12" stroke-width="1.5" fill="none">
<line x1="180" y1="120" x2="220" y2="120"/>
<line x1="200" y1="100" x2="200" y2="140"/>
<path d="M 188,108 Q 200,116 212,108"/>
<path d="M 188,132 Q 200,124 212,132"/>
</g>
<!-- player -->
<g transform="translate(70,200)">
<rect x="-5" y="0" width="20" height="22" fill="#dc2626"/>
<circle cx="5" cy="-8" r="8" fill="#fbbf24"/>
<rect x="-3" y="22" width="16" height="14" fill="#1e293b"/>
<line x1="-5" y1="3" x2="-15" y2="-12" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
<line x1="15" y1="3" x2="25" y2="-12" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
</g>
<!-- HUD -->
<rect x="10" y="10" width="100" height="28" rx="6" fill="rgba(0,0,0,0.7)"/>
<text x="60" y="29" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#fbbf24" text-anchor="middle">SCORE 17</text>
<rect x="285" y="10" width="105" height="28" rx="6" fill="rgba(0,0,0,0.7)"/>
<text x="337" y="29" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#fff" text-anchor="middle">⏱ 0:42</text>
<!-- title -->
<text x="200" y="285" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="#fff" stroke="#000" stroke-width="2" paint-order="stroke" text-anchor="middle">BASKETBALL SLAM</text>
</svg>
