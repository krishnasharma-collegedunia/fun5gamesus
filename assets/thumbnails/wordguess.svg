<rect x="100" y="160" width="38" height="38" rx="3" fill="#3a3a3c" opacity="0.5"/>
<rect x="143" y="160" width="38" height="38" rx="3" fill="#3a3a3c" opacity="0.5"/>
<rect x="186" y="160" width="38" height="38" rx="3" fill="#3a3a3c" opacity="0.5"/>
<rect x="229" y="160" width="38" height="38" rx="3" fill="#3a3a3c" opacity="0.5"/>
<rect x="272" y="160" width="38" height="38" rx="3" fill="#3a3a3c" opacity="0.5"/>
