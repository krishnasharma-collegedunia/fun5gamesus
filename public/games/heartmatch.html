<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Heart Match</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{overscroll-behavior:none;overflow:hidden;touch-action:none;width:100%;height:100%}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-family:'Arial Rounded MT Bold',Arial,sans-serif;background:linear-gradient(160deg,#ffd9ec 0%,#f6c4ff 50%,#c8b6ff 100%);min-height:100vh}
.hud{width:100%;max-width:520px;padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between}
.lvlbox{background:linear-gradient(180deg,#ff5f97,#d23a78);color:#fff;padding:6px 14px;border-radius:20px;font-weight:900;font-size:14px;box-shadow:0 4px 10px rgba(210,58,120,.4);letter-spacing:.5px}
.stats{display:flex;gap:6px;flex:1;justify-content:flex-end}
.sb{background:rgba(255,255,255,.7);backdrop-filter:blur(4px);border-radius:12px;padding:5px 11px;text-align:center;min-width:60px;border:2px solid rgba(255,255,255,.6)}
.sl{color:#a04473;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.sv{color:#5b1f3d;font-size:18px;font-weight:900;line-height:1.05}
.tg{width:100%;max-width:520px;padding:0 14px 6px;display:flex;align-items:center;gap:10px}
.tgicon{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.55);border-radius:50%;border:2px solid rgba(255,255,255,.7)}
.tgbar{flex:1;height:14px;background:rgba(255,255,255,.55);border-radius:8px;overflow:hidden;border:2px solid rgba(255,255,255,.7)}
.tgfill{height:100%;background:linear-gradient(90deg,#ff5f97,#ff90c0);border-radius:6px;width:0%;transition:width .35s ease}
.tgtxt{color:#5b1f3d;font-size:13px;font-weight:900;min-width:55px;text-align:right}
.bw{width:min(94vw,520px);aspect-ratio:1;margin-top:4px;background:rgba(255,255,255,.35);border-radius:18px;padding:6px;position:relative;touch-action:none;box-shadow:0 8px 28px rgba(180,80,140,.35);border:3px solid rgba(255,255,255,.6);backdrop-filter:blur(6px)}
.cell{position:absolute;border-radius:10px;background:rgba(255,255,255,.18);transition:none}
.piece{position:absolute;display:flex;align-items:center;justify-content:center;border-radius:12px;cursor:pointer;transition:left .25s ease,top .25s ease,transform .15s,opacity .25s}
.piece svg{width:88%;height:88%;filter:drop-shadow(0 2px 3px rgba(0,0,0,.18))}
.piece.sel{transform:scale(1.13);z-index:5;filter:drop-shadow(0 0 12px #fff)}
.piece.special{animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.piece.special::before{content:"";position:absolute;inset:0;border-radius:12px;background:radial-gradient(circle,rgba(255,255,255,.7) 0%,transparent 70%);animation:shine 1.5s linear infinite;pointer-events:none}
@keyframes shine{0%{opacity:.3}50%{opacity:.9}100%{opacity:.3}}
.piece.popping{animation:pop .35s ease-out forwards}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(0);opacity:0}}
.spark{position:absolute;width:8px;height:8px;border-radius:50%;background:#fff;pointer-events:none;animation:spk .6s ease-out forwards;box-shadow:0 0 8px #fff,0 0 14px #ff90c0}
@keyframes spk{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.cmb{position:absolute;color:#fff;font-weight:900;font-size:30px;pointer-events:none;text-shadow:0 0 8px #ff5f97,0 2px 4px rgba(0,0,0,.4);animation:cmb 1s ease-out forwards;z-index:50}
@keyframes cmb{0%{transform:translate(-50%,-50%) scale(.4);opacity:0}25%{transform:translate(-50%,-50%) scale(1.2);opacity:1}75%{transform:translate(-50%,-80%) scale(1);opacity:1}100%{transform:translate(-50%,-110%) scale(.8);opacity:0}}
.ctrls{width:100%;max-width:520px;padding:8px 14px 10px;display:flex;gap:10px;justify-content:center}
.btn{background:linear-gradient(180deg,#ff5f97,#d23a78);color:#fff;border:none;padding:9px 22px;font:900 13px inherit;border-radius:18px;letter-spacing:1px;box-shadow:0 4px 12px rgba(210,58,120,.45);touch-action:manipulation;-webkit-appearance:none;cursor:pointer;text-transform:uppercase}
.btn:active{transform:scale(.94)}
.btn.alt{background:linear-gradient(180deg,#a78bfa,#7c5cdf)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.ob{position:absolute;inset:0;background:rgba(80,30,60,.55);backdrop-filter:blur(6px);z-index:99}
.ob.hidden{display:none}
.ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:100;padding:24px;text-align:center;pointer-events:none}
.ov.hidden{display:none}
.ov>*{pointer-events:auto}
.ov h1{font-size:clamp(40px,11vw,68px);color:#fff;letter-spacing:-1.5px;line-height:.95;font-weight:900;text-shadow:0 4px 12px rgba(0,0,0,.35)}
.ov .sub{font-size:clamp(18px,5vw,26px);color:#fff;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.stars{display:flex;gap:14px;justify-content:center;margin:6px 0}
.star{width:48px;height:48px;color:#444;filter:grayscale(1) opacity(.5);transition:all .3s}
.star.on{color:#ffd54a;filter:none;animation:starpop .5s ease-out}
@keyframes starpop{0%{transform:scale(0) rotate(-180deg)}60%{transform:scale(1.3) rotate(20deg)}100%{transform:scale(1) rotate(0)}}
.conf{position:absolute;width:10px;height:14px;pointer-events:none;z-index:90;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.5}}
.flash{position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,.6) 0%,transparent 70%);pointer-events:none;animation:flash .4s ease-out forwards;border-radius:18px}
@keyframes flash{0%{opacity:0}50%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div class="hud">
  <div class="lvlbox" id="lv">Level 1</div>
  <div class="stats">
    <div class="sb"><div class="sl">Moves</div><div class="sv" id="mv">20</div></div>
    <div class="sb"><div class="sl">Score</div><div class="sv" id="sc">0</div></div>
    <div class="sb"><div class="sl">Best</div><div class="sv" id="bs">0</div></div>
  </div>
</div>
<div class="tg">
  <div class="tgicon" id="tgi"></div>
  <div class="tgbar"><div class="tgfill" id="tgf"></div></div>
  <div class="tgtxt" id="tgt">0/10</div>
</div>
<div class="bw" id="board"></div>
<div class="ctrls">
  <button class="btn" id="rs" ontouchstart="">Restart</button>
  <button class="btn alt" id="ht" ontouchstart="">Hint (3)</button>
</div>
<div class="ob hidden" id="ob"></div>
<div class="ov hidden" id="ov">
  <h1 id="oh">LEVEL<br>COMPLETE</h1>
  <div class="sub" id="osub">Score: 0</div>
  <div class="stars" id="stb"></div>
  <button class="btn" id="oa" ontouchstart="">CONTINUE</button>
</div>
<script>
(function(){'use strict';
var SZ=8;
var board=document.getElementById('board');
var mvE=document.getElementById('mv'),scE=document.getElementById('sc'),bsE=document.getElementById('bs');
var lvE=document.getElementById('lv'),tgfE=document.getElementById('tgf'),tgtE=document.getElementById('tgt'),tgiE=document.getElementById('tgi');
var ovE=document.getElementById('ov'),obE=document.getElementById('ob'),ohE=document.getElementById('oh'),osubE=document.getElementById('osub'),stbE=document.getElementById('stb'),oaE=document.getElementById('oa');
var rsE=document.getElementById('rs'),htE=document.getElementById('ht');

// Type constants
var T_RHEART=0,T_PHEART=1,T_ROSE=2,T_RING=3,T_GIFT=4,T_BFLY=5;
var TYPES=6;
// Special markers
var SP_NONE=0,SP_ROW=1,SP_COL=2,SP_BOMB=3;

// SVG icons
var SVG=[
 // 0 red heart
 '<svg viewBox="0 0 24 24"><defs><linearGradient id="rh" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff6b8a"/><stop offset="1" stop-color="#d11d3f"/></linearGradient></defs><path d="M12 21s-7-4.5-9.5-9.5C.8 8 3 4 6.5 4c2 0 3.5 1 5.5 3 2-2 3.5-3 5.5-3C21 4 23.2 8 21.5 11.5 19 16.5 12 21 12 21z" fill="url(#rh)" stroke="#ad0a30" stroke-width=".7"/><ellipse cx="9" cy="9" rx="2" ry="1.4" fill="#fff" opacity=".5"/></svg>',
 // 1 pink heart
 '<svg viewBox="0 0 24 24"><defs><linearGradient id="ph" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffc4dc"/><stop offset="1" stop-color="#f76aa8"/></linearGradient></defs><path d="M12 21s-7-4.5-9.5-9.5C.8 8 3 4 6.5 4c2 0 3.5 1 5.5 3 2-2 3.5-3 5.5-3C21 4 23.2 8 21.5 11.5 19 16.5 12 21 12 21z" fill="url(#ph)" stroke="#d44a85" stroke-width=".7"/><ellipse cx="9" cy="9" rx="2" ry="1.4" fill="#fff" opacity=".6"/></svg>',
 // 2 rose
 '<svg viewBox="0 0 24 24"><defs><radialGradient id="rs" cx=".5" cy=".5" r=".5"><stop offset="0" stop-color="#ff8fb1"/><stop offset="1" stop-color="#c4225b"/></radialGradient></defs><circle cx="12" cy="12" r="8" fill="#1f8a3a"/><path d="M12 5c-3 1-5 3-5 6 0 3 2 5 5 5s5-2 5-5c0-3-2-5-5-6z" fill="url(#rs)"/><path d="M12 7c-2 0-3.5 1.5-3.5 3.5 0 1.5 1 2.5 2 3 0-1 .5-2 1.5-2.5 1 .5 1.5 1.5 1.5 2.5 1-.5 2-1.5 2-3 0-2-1.5-3.5-3.5-3.5z" fill="#ff5f8a" opacity=".8"/><circle cx="12" cy="11.5" r="1.6" fill="#8a0a30"/><path d="M5 14c-1 0-2 1-2 2 1.5 0 3-.5 4-1.5z" fill="#1f8a3a"/><path d="M19 14c1 0 2 1 2 2-1.5 0-3-.5-4-1.5z" fill="#1f8a3a"/></svg>',
 // 3 ring
 '<svg viewBox="0 0 24 24"><defs><linearGradient id="rg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe680"/><stop offset=".5" stop-color="#f5b700"/><stop offset="1" stop-color="#a37200"/></linearGradient><radialGradient id="dm" cx=".4" cy=".4" r=".5"><stop offset="0" stop-color="#fff"/><stop offset=".5" stop-color="#a4f0ff"/><stop offset="1" stop-color="#1289b8"/></radialGradient></defs><circle cx="12" cy="15" r="6.5" fill="none" stroke="url(#rg)" stroke-width="2.5"/><polygon points="12,4 9,7 12,11 15,7" fill="url(#dm)" stroke="#1265a8" stroke-width=".5"/><line x1="12" y1="4" x2="12" y2="11" stroke="#fff" stroke-width=".4" opacity=".7"/></svg>',
 // 4 gift
 '<svg viewBox="0 0 24 24"><defs><linearGradient id="gf" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a4d6ff"/><stop offset="1" stop-color="#3a7fc4"/></linearGradient></defs><rect x="3" y="9" width="18" height="12" rx="1.5" fill="url(#gf)" stroke="#1c5a99" stroke-width=".7"/><rect x="3" y="6" width="18" height="4" rx="1" fill="#5e9be0" stroke="#1c5a99" stroke-width=".7"/><rect x="10.5" y="6" width="3" height="15" fill="#ffd54a" stroke="#a37200" stroke-width=".5"/><path d="M12 6c-2-3-5-2-5 0 0 1.5 2 2 5 2 3 0 5-.5 5-2 0-2-3-3-5 0z" fill="#ffd54a" stroke="#a37200" stroke-width=".5"/></svg>',
 // 5 butterfly
 '<svg viewBox="0 0 24 24"><defs><radialGradient id="bf" cx=".5" cy=".5" r=".6"><stop offset="0" stop-color="#fff5b8"/><stop offset=".5" stop-color="#ffaa44"/><stop offset="1" stop-color="#c44a00"/></radialGradient></defs><ellipse cx="6" cy="9" rx="5" ry="4" fill="url(#bf)" stroke="#7a2800" stroke-width=".6"/><ellipse cx="18" cy="9" rx="5" ry="4" fill="url(#bf)" stroke="#7a2800" stroke-width=".6"/><ellipse cx="6" cy="15" rx="4" ry="3" fill="url(#bf)" stroke="#7a2800" stroke-width=".6"/><ellipse cx="18" cy="15" rx="4" ry="3" fill="url(#bf)" stroke="#7a2800" stroke-width=".6"/><circle cx="6" cy="9" r="1.2" fill="#fff" opacity=".6"/><circle cx="18" cy="9" r="1.2" fill="#fff" opacity=".6"/><rect x="11.4" y="5" width="1.2" height="14" rx=".6" fill="#3a1500"/><circle cx="12" cy="5" r="1.1" fill="#3a1500"/><line x1="11.4" y1="4.5" x2="9.5" y2="2.5" stroke="#3a1500" stroke-width=".6" stroke-linecap="round"/><line x1="12.6" y1="4.5" x2="14.5" y2="2.5" stroke="#3a1500" stroke-width=".6" stroke-linecap="round"/></svg>'
];

// Level definitions
var LEVELS=[];
function buildLevels(){
  var targetTypes=[T_RHEART,T_PHEART,T_ROSE,T_RING,T_GIFT,T_BFLY];
  for(var i=0;i<30;i++){
    var moves=Math.max(15,22-Math.floor(i/4));
    var target=10+Math.floor(i*1.6);
    var tt=targetTypes[i%6];
    if(i<5)tt=T_RHEART;
    LEVELS.push({moves:moves,target:target,type:tt});
  }
}
buildLevels();

// State
var grid=[],pieces=[],level=0,moves=0,score=0,best=0;
var targetType=T_RHEART,targetCount=0,targetGoal=10;
var hintsLeft=3,busy=false;
var cellSize=0,padPx=6;
var highScore=0;

try{level=parseInt(localStorage.getItem('hm_level'))||0;if(level>=30)level=0}catch(e){}
try{highScore=parseInt(localStorage.getItem('hm_high_score'))||0}catch(e){}
bsE.textContent=highScore;

function saveState(){
  try{localStorage.setItem('hm_level',level);localStorage.setItem('hm_high_score',highScore);}catch(e){}
}

function calcSizes(){
  var bw=board.clientWidth-padPx*2;
  cellSize=bw/SZ;
}

function makePiece(type,r,c){
  var p={type:type,r:r,c:c,special:SP_NONE,el:null};
  return p;
}

function pieceEl(p){
  var el=document.createElement('div');
  el.className='piece';
  el.innerHTML=SVG[p.type];
  if(p.special!==SP_NONE)el.classList.add('special');
  positionEl(el,p.r,p.c);
  el.style.width=cellSize+'px';
  el.style.height=cellSize+'px';
  return el;
}

function positionEl(el,r,c){
  el.style.left=(padPx+c*cellSize)+'px';
  el.style.top=(padPx+r*cellSize)+'px';
}

function buildBoard(){
  board.innerHTML='';
  calcSizes();
  // background cells
  for(var r=0;r<SZ;r++){
    for(var c=0;c<SZ;c++){
      var cell=document.createElement('div');
      cell.className='cell';
      cell.style.width=(cellSize-4)+'px';
      cell.style.height=(cellSize-4)+'px';
      cell.style.left=(padPx+c*cellSize+2)+'px';
      cell.style.top=(padPx+r*cellSize+2)+'px';
      board.appendChild(cell);
    }
  }
  // pieces
  grid=[];
  for(var r=0;r<SZ;r++){
    grid[r]=[];
    for(var c=0;c<SZ;c++){
      var t=randTypeNoMatch(r,c);
      var p=makePiece(t,r,c);
      grid[r][c]=p;
      var el=pieceEl(p);
      board.appendChild(el);
      p.el=el;
    }
  }
}

function randTypeNoMatch(r,c){
  var tries=0;
  while(tries<20){
    var t=Math.floor(Math.random()*TYPES);
    var bad=false;
    if(c>=2 && grid[r][c-1] && grid[r][c-2] && grid[r][c-1].type===t && grid[r][c-2].type===t)bad=true;
    if(r>=2 && grid[r-1] && grid[r-1][c] && grid[r-2] && grid[r-2][c] && grid[r-1][c].type===t && grid[r-2][c].type===t)bad=true;
    if(!bad)return t;
    tries++;
  }
  return Math.floor(Math.random()*TYPES);
}

function startLevel(){
  var lv=LEVELS[level];
  moves=lv.moves;
  score=0;
  targetType=lv.type;
  targetGoal=lv.target;
  targetCount=0;
  hintsLeft=3;
  busy=false;
  updateHUD();
  setTargetIcon();
  buildBoard();
  // ensure no initial matches
  setTimeout(function(){removeInitialMatches();},20);
}

function removeInitialMatches(){
  var changed=true,guard=0;
  while(changed && guard<10){
    var ms=findMatches();
    if(ms.length===0){changed=false;break;}
    for(var i=0;i<ms.length;i++){
      var m=ms[i];
      for(var j=0;j<m.cells.length;j++){
        var rc=m.cells[j];
        var p=grid[rc[0]][rc[1]];
        if(p){
          var nt;
          do{nt=Math.floor(Math.random()*TYPES);}while(nt===p.type);
          p.type=nt;
          p.el.innerHTML=SVG[nt];
        }
      }
    }
    guard++;
  }
}

function setTargetIcon(){
  tgiE.innerHTML='<div style="width:80%;height:80%">'+SVG[targetType]+'</div>';
}

function updateHUD(){
  mvE.textContent=moves;
  scE.textContent=score;
  lvE.textContent='Level '+(level+1);
  var pct=Math.min(100,Math.round(targetCount/targetGoal*100));
  tgfE.style.width=pct+'%';
  tgtE.textContent=targetCount+'/'+targetGoal;
  bsE.textContent=Math.max(highScore,score);
}

// Match detection
function findMatches(){
  var matches=[];
  // rows
  for(var r=0;r<SZ;r++){
    var c=0;
    while(c<SZ){
      var t=grid[r][c]?grid[r][c].type:-1;
      if(t<0){c++;continue;}
      var k=c+1;
      while(k<SZ && grid[r][k] && grid[r][k].type===t)k++;
      if(k-c>=3){
        var cells=[];
        for(var i=c;i<k;i++)cells.push([r,i]);
        matches.push({cells:cells,dir:'row',type:t,len:k-c});
      }
      c=k;
    }
  }
  // cols
  for(var c=0;c<SZ;c++){
    var r=0;
    while(r<SZ){
      var t=grid[r][c]?grid[r][c].type:-1;
      if(t<0){r++;continue;}
      var k=r+1;
      while(k<SZ && grid[k][c] && grid[k][c].type===t)k++;
      if(k-r>=3){
        var cells=[];
        for(var i=r;i<k;i++)cells.push([i,c]);
        matches.push({cells:cells,dir:'col',type:t,len:k-r});
      }
      r=k;
    }
  }
  return matches;
}

// Process matches with cascade
function processMatches(cascadeLevel){
  cascadeLevel=cascadeLevel||1;
  var matches=findMatches();
  if(matches.length===0){
    // check if any cells are null (from special activation) — if so, run gravity
    var hasNull=false;
    for(var r=0;r<SZ && !hasNull;r++){
      for(var c=0;c<SZ;c++){
        if(!grid[r][c]){hasNull=true;break;}
      }
    }
    if(hasNull){
      setTimeout(function(){
        applyGravity();
        setTimeout(function(){processMatches(cascadeLevel+1);},280);
      },80);
      return;
    }
    busy=false;
    checkLevelEnd();
    return;
  }
  // collect cells to clear and special pieces to create
  var toClear={};
  var specials=[];
  for(var i=0;i<matches.length;i++){
    var m=matches[i];
    for(var j=0;j<m.cells.length;j++){
      var rc=m.cells[j];
      toClear[rc[0]+','+rc[1]]=true;
    }
    // create special pieces
    if(m.len===4){
      var midIdx=Math.floor(m.cells.length/2);
      var rc=m.cells[midIdx];
      specials.push({r:rc[0],c:rc[1],type:m.type,sp:m.dir==='row'?SP_ROW:SP_COL});
      delete toClear[rc[0]+','+rc[1]];
    }else if(m.len>=5){
      var midIdx=Math.floor(m.cells.length/2);
      var rc=m.cells[midIdx];
      specials.push({r:rc[0],c:rc[1],type:m.type,sp:SP_BOMB});
      delete toClear[rc[0]+','+rc[1]];
    }
  }
  // count cleared, check target
  var clearedCount=0;
  var clearedTargetCount=0;
  for(var key in toClear){
    var parts=key.split(',');
    var r=parseInt(parts[0]),c=parseInt(parts[1]);
    var p=grid[r][c];
    if(!p)continue;
    clearedCount++;
    if(p.type===targetType)clearedTargetCount++;
    // sparkle effect
    spawnSparkles(r,c);
    // animate pop
    p.el.classList.add('popping');
    (function(elm){setTimeout(function(){if(elm && elm.parentNode)elm.parentNode.removeChild(elm);},350);})(p.el);
    grid[r][c]=null;
  }
  // create specials
  for(var i=0;i<specials.length;i++){
    var s=specials[i];
    var p=grid[s.r][s.c];
    if(p){
      p.special=s.sp;
      p.el.classList.add('special');
    }else{
      // spot was cleared, create a new piece
      var np=makePiece(s.type,s.r,s.c);
      np.special=s.sp;
      var el=pieceEl(np);
      board.appendChild(el);
      np.el=el;
      grid[s.r][s.c]=np;
    }
  }
  // score
  var basePts=clearedCount*10*cascadeLevel;
  score+=basePts;
  if(clearedTargetCount>0)targetCount+=clearedTargetCount;
  if(score>highScore){highScore=score;}
  updateHUD();
  if(cascadeLevel>=2){
    showCombo(cascadeLevel);
  }
  // gravity then re-check
  setTimeout(function(){
    applyGravity();
    setTimeout(function(){
      processMatches(cascadeLevel+1);
    },280);
  },380);
}

function spawnSparkles(r,c){
  var x=padPx+c*cellSize+cellSize/2;
  var y=padPx+r*cellSize+cellSize/2;
  for(var i=0;i<6;i++){
    var s=document.createElement('div');
    s.className='spark';
    s.style.left=(x-4)+'px';
    s.style.top=(y-4)+'px';
    var ang=Math.PI*2*i/6+Math.random()*0.5;
    var dist=20+Math.random()*25;
    s.style.setProperty('--dx',(Math.cos(ang)*dist)+'px');
    s.style.setProperty('--dy',(Math.sin(ang)*dist)+'px');
    board.appendChild(s);
    (function(elm){setTimeout(function(){if(elm.parentNode)elm.parentNode.removeChild(elm);},650);})(s);
  }
}

function showCombo(n){
  var c=document.createElement('div');
  c.className='cmb';
  c.textContent='x'+n+'!';
  c.style.left='50%';
  c.style.top='50%';
  board.appendChild(c);
  setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},1000);
}

function applyGravity(){
  for(var c=0;c<SZ;c++){
    var write=SZ-1;
    for(var r=SZ-1;r>=0;r--){
      if(grid[r][c]){
        if(write!==r){
          grid[write][c]=grid[r][c];
          grid[write][c].r=write;
          grid[r][c]=null;
          positionEl(grid[write][c].el,write,c);
        }
        write--;
      }
    }
    // fill with new pieces
    for(var r=write;r>=0;r--){
      var t=Math.floor(Math.random()*TYPES);
      var p=makePiece(t,r,c);
      grid[r][c]=p;
      var el=pieceEl(p);
      el.style.top=(padPx-cellSize*(write-r+1))+'px';
      board.appendChild(el);
      p.el=el;
      // animate down
      setTimeout((function(_el,_r,_c){return function(){positionEl(_el,_r,_c);};})(el,r,c),20);
    }
  }
}

// Swap logic
function swapPieces(r1,c1,r2,c2,andCheck){
  var p1=grid[r1][c1],p2=grid[r2][c2];
  if(!p1||!p2)return;
  grid[r1][c1]=p2;p2.r=r1;p2.c=c1;
  grid[r2][c2]=p1;p1.r=r2;p1.c=c2;
  positionEl(p1.el,r2,c2);
  positionEl(p2.el,r1,c1);
  if(andCheck){
    setTimeout(function(){
      // check if specials triggered (one of them is special)
      var triggered=false;
      var specialList=[];
      if(p1.special!==SP_NONE){specialList.push(p1);}
      if(p2.special!==SP_NONE){specialList.push(p2);}
      if(specialList.length>0){
        triggered=true;
        for(var i=0;i<specialList.length;i++){
          activateSpecial(specialList[i]);
        }
      }
      var ms=findMatches();
      if(ms.length===0 && !triggered){
        // swap back
        grid[r1][c1]=p1;p1.r=r1;p1.c=c1;
        grid[r2][c2]=p2;p2.r=r2;p2.c=c2;
        positionEl(p1.el,r1,c1);
        positionEl(p2.el,r2,c2);
        setTimeout(function(){busy=false;},260);
      }else{
        moves--;
        updateHUD();
        setTimeout(function(){processMatches(1);},80);
      }
    },280);
  }
}

function activateSpecial(p){
  if(!p||p.special===SP_NONE)return;
  var r=p.r,c=p.c,sp=p.special;
  p.special=SP_NONE;
  // collect cells to clear
  var cellsToClear=[];
  if(sp===SP_ROW){
    for(var i=0;i<SZ;i++)cellsToClear.push([r,i]);
    flashRow(r);
  }else if(sp===SP_COL){
    for(var i=0;i<SZ;i++)cellsToClear.push([i,c]);
    flashCol(c);
  }else if(sp===SP_BOMB){
    for(var dr=-1;dr<=1;dr++){
      for(var dc=-1;dc<=1;dc++){
        var nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<SZ&&nc>=0&&nc<SZ)cellsToClear.push([nr,nc]);
      }
    }
    flashArea(r,c);
  }
  // clear them (as if matched)
  var clearedCount=0,clearedTarget=0;
  for(var i=0;i<cellsToClear.length;i++){
    var rc=cellsToClear[i];
    var pp=grid[rc[0]][rc[1]];
    if(!pp)continue;
    clearedCount++;
    if(pp.type===targetType)clearedTarget++;
    spawnSparkles(rc[0],rc[1]);
    pp.el.classList.add('popping');
    (function(elm){setTimeout(function(){if(elm && elm.parentNode)elm.parentNode.removeChild(elm);},350);})(pp.el);
    grid[rc[0]][rc[1]]=null;
  }
  score+=clearedCount*15;
  if(clearedTarget>0)targetCount+=clearedTarget;
  if(score>highScore)highScore=score;
  updateHUD();
}

function flashRow(r){
  var f=document.createElement('div');
  f.className='flash';
  f.style.top=(padPx+r*cellSize)+'px';
  f.style.height=cellSize+'px';
  f.style.left='0';
  f.style.right='0';
  f.style.borderRadius='4px';
  board.appendChild(f);
  setTimeout(function(){if(f.parentNode)f.parentNode.removeChild(f);},400);
}
function flashCol(c){
  var f=document.createElement('div');
  f.className='flash';
  f.style.left=(padPx+c*cellSize)+'px';
  f.style.width=cellSize+'px';
  f.style.top='0';
  f.style.bottom='0';
  f.style.borderRadius='4px';
  board.appendChild(f);
  setTimeout(function(){if(f.parentNode)f.parentNode.removeChild(f);},400);
}
function flashArea(r,c){
  var f=document.createElement('div');
  f.className='flash';
  f.style.left=(padPx+(c-1)*cellSize)+'px';
  f.style.top=(padPx+(r-1)*cellSize)+'px';
  f.style.width=(cellSize*3)+'px';
  f.style.height=(cellSize*3)+'px';
  f.style.borderRadius='14px';
  board.appendChild(f);
  setTimeout(function(){if(f.parentNode)f.parentNode.removeChild(f);},400);
}

function checkLevelEnd(){
  if(targetCount>=targetGoal){
    // Level complete
    setTimeout(function(){endLevel(true);},300);
  }else if(moves<=0){
    setTimeout(function(){endLevel(false);},300);
  }
}

function endLevel(won){
  busy=true;
  if(won){
    // Calculate stars
    var lv=LEVELS[level];
    var movesLeft=Math.max(0,moves);
    var stars=1;
    if(movesLeft>=lv.moves*0.3)stars=2;
    if(movesLeft>=lv.moves*0.5)stars=3;
    // bonus score
    score+=movesLeft*50;
    if(score>highScore)highScore=score;
    updateHUD();
    // save stars for the level just completed
    var completedLevel=level;
    try{
      var sk=localStorage.getItem('hm_stars')||'{}';
      var so=JSON.parse(sk);
      so[completedLevel]=Math.max(so[completedLevel]||0,stars);
      localStorage.setItem('hm_stars',JSON.stringify(so));
    }catch(e){}
    // advance level
    if(level<29)level=level+1;
    saveState();
    showOverlay('LEVEL<br>COMPLETE','Score: '+score,stars,'NEXT LEVEL');
    spawnConfetti();
  }else{
    showOverlay('OUT OF<br>MOVES','Score: '+score,0,'TRY AGAIN');
  }
}

function showOverlay(title,sub,stars,btn){
  ohE.innerHTML=title;
  osubE.textContent=sub;
  stbE.innerHTML='';
  for(var i=0;i<3;i++){
    var s=document.createElement('div');
    s.className='star'+(i<stars?' on':'');
    s.innerHTML='<svg viewBox="0 0 24 24" width="100%" height="100%"><path fill="currentColor" d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>';
    stbE.appendChild(s);
  }
  oaE.textContent=btn;
  obE.classList.remove('hidden');
  ovE.classList.remove('hidden');
}

function hideOverlay(){
  obE.classList.add('hidden');
  ovE.classList.add('hidden');
}

function spawnConfetti(){
  var colors=['#ff5f97','#ffc4dc','#a78bfa','#ffd54a','#ff9090','#7c5cdf'];
  for(var i=0;i<60;i++){
    (function(idx){
      setTimeout(function(){
        var c=document.createElement('div');
        c.className='conf';
        c.style.left=(Math.random()*100)+'vw';
        c.style.top='-20px';
        c.style.background=colors[Math.floor(Math.random()*colors.length)];
        c.style.borderRadius=Math.random()>.5?'50%':'2px';
        var dur=2+Math.random()*2;
        c.style.animationDuration=dur+'s';
        if(Math.random()>.5){
          c.style.width=(8+Math.random()*8)+'px';
          c.style.height=(10+Math.random()*8)+'px';
        }else{
          // heart shape via svg
          c.style.background='transparent';
          c.style.width='14px';c.style.height='14px';
          c.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14"><path fill="'+colors[Math.floor(Math.random()*colors.length)]+'" d="M12 21s-7-4.5-9.5-9.5C.8 8 3 4 6.5 4c2 0 3.5 1 5.5 3 2-2 3.5-3 5.5-3C21 4 23.2 8 21.5 11.5 19 16.5 12 21 12 21z"/></svg>';
        }
        document.body.appendChild(c);
        setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},dur*1000+200);
      },idx*30);
    })(i);
  }
}

// Input handling
var dragStart=null,selected=null;
function getCellFromEvent(e){
  var rect=board.getBoundingClientRect();
  var t=e.touches?e.touches[0]:e;
  var x=t.clientX-rect.left-padPx;
  var y=t.clientY-rect.top-padPx;
  var c=Math.floor(x/cellSize);
  var r=Math.floor(y/cellSize);
  if(r<0||r>=SZ||c<0||c>=SZ)return null;
  return [r,c];
}

function onDown(e){
  if(busy)return;
  var rc=getCellFromEvent(e);
  if(!rc)return;
  dragStart={r:rc[0],c:rc[1],x:(e.touches?e.touches[0]:e).clientX,y:(e.touches?e.touches[0]:e).clientY};
  // tap-to-activate special
  var p=grid[rc[0]][rc[1]];
  if(p && p.special!==SP_NONE && !selected){
    // require double tap or just activate immediately
  }
  if(selected){
    var dr=Math.abs(selected.r-rc[0]),dc=Math.abs(selected.c-rc[1]);
    if(dr+dc===1){
      busy=true;
      selected.el.classList.remove('sel');
      swapPieces(selected.r,selected.c,rc[0],rc[1],true);
      selected=null;
      dragStart=null;
      return;
    }
    selected.el.classList.remove('sel');
    selected=null;
  }
  if(p){
    selected=p;
    p.el.classList.add('sel');
  }
  e.preventDefault();
}

function onMove(e){
  if(busy||!dragStart)return;
  var t=e.touches?e.touches[0]:e;
  var dx=t.clientX-dragStart.x,dy=t.clientY-dragStart.y;
  var thresh=cellSize*0.4;
  if(Math.abs(dx)<thresh && Math.abs(dy)<thresh)return;
  var nr=dragStart.r,nc=dragStart.c;
  if(Math.abs(dx)>Math.abs(dy)){
    nc+=dx>0?1:-1;
  }else{
    nr+=dy>0?1:-1;
  }
  if(nr<0||nr>=SZ||nc<0||nc>=SZ){dragStart=null;return;}
  if(selected){selected.el.classList.remove('sel');selected=null;}
  busy=true;
  swapPieces(dragStart.r,dragStart.c,nr,nc,true);
  dragStart=null;
  e.preventDefault();
}

function onUp(e){
  dragStart=null;
}

board.addEventListener('touchstart',onDown,{passive:false});
board.addEventListener('touchmove',onMove,{passive:false});
board.addEventListener('touchend',onUp,{passive:false});
board.addEventListener('mousedown',onDown);
board.addEventListener('mousemove',onMove);
board.addEventListener('mouseup',onUp);

// Hint
function findHint(){
  // try every adjacent swap, see if it makes a match
  for(var r=0;r<SZ;r++){
    for(var c=0;c<SZ;c++){
      var swaps=[[0,1],[1,0]];
      for(var s=0;s<swaps.length;s++){
        var nr=r+swaps[s][0],nc=c+swaps[s][1];
        if(nr>=SZ||nc>=SZ)continue;
        // hypothetical swap
        var p1=grid[r][c],p2=grid[nr][nc];
        if(!p1||!p2)continue;
        var t1=p1.type,t2=p2.type;
        p1.type=t2;p2.type=t1;
        var has=findMatches().length>0;
        p1.type=t1;p2.type=t2;
        if(has)return [r,c,nr,nc];
      }
    }
  }
  return null;
}

htE.addEventListener('click',function(){
  if(busy||hintsLeft<=0)return;
  var h=findHint();
  if(h){
    var p=grid[h[0]][h[1]];
    if(p){
      p.el.classList.add('sel');
      setTimeout(function(){if(p.el)p.el.classList.remove('sel');},1500);
    }
    hintsLeft--;
    htE.textContent='Hint ('+hintsLeft+')';
    if(hintsLeft===0)htE.disabled=true;
  }
});

rsE.addEventListener('click',function(){
  hideOverlay();
  startLevel();
});

oaE.addEventListener('click',function(){
  hideOverlay();
  startLevel();
});

window.addEventListener('resize',function(){
  // rebuild positioning on resize
  calcSizes();
  for(var r=0;r<SZ;r++){
    for(var c=0;c<SZ;c++){
      var p=grid[r] && grid[r][c];
      if(p){
        p.el.style.width=cellSize+'px';
        p.el.style.height=cellSize+'px';
        positionEl(p.el,r,c);
      }
    }
  }
  // rebuild background cells
  var cells=board.querySelectorAll('.cell');
  for(var i=0;i<cells.length;i++){
    var rr=Math.floor(i/SZ),cc=i%SZ;
    cells[i].style.width=(cellSize-4)+'px';
    cells[i].style.height=(cellSize-4)+'px';
    cells[i].style.left=(padPx+cc*cellSize+2)+'px';
    cells[i].style.top=(padPx+rr*cellSize+2)+'px';
  }
});

// Start
startLevel();

})();
</script>
