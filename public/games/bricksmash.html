<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Brick Smash</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{overscroll-behavior:none;overflow:hidden;touch-action:none;width:100%;height:100%;background:#0a0e2e}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;touch-action:none}
.hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:10px 14px;pointer-events:none;z-index:10}
.hb{background:rgba(0,0,0,.6);border:2px solid rgba(0,255,255,.5);border-radius:12px;padding:6px 12px;text-align:center;min-width:66px}
.hl{color:rgba(0,255,255,.85);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:bold;font-family:Arial,sans-serif}
.hv{color:#fff;font-size:24px;font-weight:bold;line-height:1.1;text-shadow:0 0 10px rgba(0,255,255,.7);font-family:Arial,sans-serif}
.ob{position:absolute;inset:0;background:rgba(5,10,30,.93);z-index:19}
.ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:20;padding:24px;text-align:center}
.ov.hidden,.ob.hidden{display:none}
.ov h1{font:900 clamp(44px,12vw,80px) Arial;color:#00ffff;text-shadow:0 0 40px rgba(0,255,255,.8),4px 4px 0 #000;letter-spacing:4px;line-height:.95}
.sub{color:rgba(0,255,255,.75);font:14px Arial;letter-spacing:3px}
.fs{font:bold clamp(26px,7vw,42px) Arial;color:#00ffff;letter-spacing:2px;text-shadow:2px 2px 0 #000}
.bst{color:#fff;font:clamp(14px,3.5vw,18px) Arial}
.btn{background:linear-gradient(180deg,#00ffff,#0088aa);color:#000;border:2px solid rgba(255,255,255,.4);padding:15px 50px;font:900 clamp(17px,4.5vw,22px) Arial;border-radius:50px;letter-spacing:3px;box-shadow:0 6px 28px rgba(0,200,255,.6);touch-action:manipulation;-webkit-appearance:none;cursor:pointer}
.btn:active{transform:scale(.96)}
.hn{color:rgba(0,255,255,.45);font:12px Arial;letter-spacing:2px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
<div class="hb"><div class="hl">Score</div><div class="hv" id="sc">0</div></div>
<div class="hb"><div class="hl">Level</div><div class="hv" id="lv">1</div></div>
<div class="hb"><div class="hl">Lives</div><div class="hv" id="li">3</div></div>
</div>
<div class="ob" id="ob1"></div>
<div class="ov" id="ov1"><h1>BRICK<br>SMASH</h1><div class="sub">BREAK ALL BRICKS</div><button class="btn" id="b1" ontouchstart="">▶ PLAY</button><div class="hn">Drag / Arrows to move · Tap to launch</div></div>
<div class="ob hidden" id="ob2"></div>
<div class="ov hidden" id="ov2"><h1 id="oh">GAME<br>OVER</h1><div class="fs" id="fS">0</div><div class="bst" id="fB">Best: 0</div><button class="btn" id="b2" ontouchstart="">PLAY AGAIN</button></div>
<script>
(function(){'use strict';
var C=document.getElementById('c'),X=C.getContext('2d'),W,H;
var scE=document.getElementById('sc'),lvE=document.getElementById('lv'),liE=document.getElementById('li');
var fS=document.getElementById('fS'),fB=document.getElementById('fB'),oh=document.getElementById('oh');
var ov1=document.getElementById('ov1'),ob1=document.getElementById('ob1');
var ov2=document.getElementById('ov2'),ob2=document.getElementById('ob2');
var paddle,balls,bricks,particles,score,level,lives,best=0,run=false,last=0,lDelay=0;
var keys={},dragX=null;
try{best=parseInt(localStorage.getItem('bs_b'))||0}catch(e){}

function sz(){W=C.width=window.innerWidth;H=C.height=window.innerHeight}
function hide(e){e.classList.add('hidden')}
function show(e){e.classList.remove('hidden')}
function raf(f){requestAnimationFrame(f)}

function mkBricks(){
bricks=[];var cols=Math.min(10,Math.floor(W/60)),rows=Math.min(6,3+Math.floor(level/2));
var mg=20,top=100,bw=(W-mg*2)/cols-6,bh=22;
var clrs=['#ff3366','#ff9500','#ffd700','#00ff88','#00ffff','#9d4edd'];
for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
var bx=mg+c*(bw+6)+bw/2,by=top+r*(bh+6)+bh/2;
bricks.push({x:bx,y:by,w:bw,h:bh,color:clrs[r%clrs.length],hp:Math.min(3,1+Math.floor(r/2)),mhp:Math.min(3,1+Math.floor(r/2))})}}

function rst(){
paddle={x:W/2,y:H-60,w:Math.min(140,W*.25),h:16,vx:0};
balls=[{x:W/2,y:H-100,vx:0,vy:0,r:10,stuck:true}];
particles=[];score=0;level=1;lives=3;lDelay=500;
mkBricks();scE.textContent=0;lvE.textContent=1;liE.textContent=3}

function go(){sz();rst();hide(ov1);hide(ob1);hide(ov2);hide(ob2);run=true;last=performance.now();raf(loop)}

function launch(){balls.forEach(function(b){if(b.stuck){b.stuck=false;b.vy=-6-level*.3;b.vx=(Math.random()-.5)*4}})}

function nextLvl(){level++;lvE.textContent=level;mkBricks();
balls=[{x:paddle.x,y:paddle.y-30,vx:0,vy:0,r:10,stuck:true}];lDelay=800}

function boom(x,y,col,n){
for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,s=Math.random()*4+1;
particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30,color:col})}}

function upd(dt){
if(keys.ArrowLeft)paddle.vx=-9;else if(keys.ArrowRight)paddle.vx=9;else paddle.vx*=.75;
if(dragX!==null)paddle.x+=(dragX-paddle.x)*.3;else paddle.x+=paddle.vx;
paddle.x=Math.max(paddle.w/2,Math.min(W-paddle.w/2,paddle.x));
if(lDelay>0){lDelay-=dt;balls.forEach(function(b){if(b.stuck){b.x=paddle.x;b.y=paddle.y-20}});return}
balls.forEach(function(b){if(b.stuck){b.x=paddle.x;b.y=paddle.y-20;return}
b.x+=b.vx;b.y+=b.vy;
if(b.x-b.r<0){b.x=b.r;b.vx=-b.vx}
if(b.x+b.r>W){b.x=W-b.r;b.vx=-b.vx}
if(b.y-b.r<0){b.y=b.r;b.vy=-b.vy}
if(b.y+b.r>paddle.y-paddle.h/2&&b.y<paddle.y&&Math.abs(b.x-paddle.x)<paddle.w/2+b.r){
b.y=paddle.y-paddle.h/2-b.r;var hit=(b.x-paddle.x)/(paddle.w/2);
var spd=Math.hypot(b.vx,b.vy),ang=-Math.PI/2+hit*1;
b.vx=Math.cos(ang)*spd;b.vy=Math.sin(ang)*spd}
if(b.y-b.r>H)b.dead=true;
for(var i=0;i<bricks.length;i++){var br=bricks[i];if(br.hp<=0)continue;
if(b.x+b.r>br.x-br.w/2&&b.x-b.r<br.x+br.w/2&&b.y+b.r>br.y-br.h/2&&b.y-b.r<br.y+br.h/2){
var dx=b.x-br.x,dy=b.y-br.y;
if(Math.abs(dx/br.w)>Math.abs(dy/br.h))b.vx=-b.vx;else b.vy=-b.vy;
br.hp--;if(br.hp<=0){score+=10*level;scE.textContent=score;boom(br.x,br.y,br.color,12)}else boom(br.x,br.y,br.color,4);break}}});
balls=balls.filter(function(b){return!b.dead});
if(balls.length===0){lives--;liE.textContent=lives;if(lives<=0){die();return}
balls=[{x:paddle.x,y:paddle.y-30,vx:0,vy:0,r:10,stuck:true}];lDelay=800}
particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life--});
particles=particles.filter(function(p){return p.life>0});
if(bricks.filter(function(b){return b.hp>0}).length===0)nextLvl()}

function draw(){
var bg=X.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#0a0e2e');bg.addColorStop(1,'#1a2e5e');
X.fillStyle=bg;X.fillRect(0,0,W,H);
bricks.forEach(function(br){if(br.hp<=0)return;
var a=br.hp/br.mhp;X.fillStyle=br.color;X.globalAlpha=.4+a*.6;
X.fillRect(br.x-br.w/2,br.y-br.h/2,br.w,br.h);X.globalAlpha=1;
X.fillStyle='rgba(255,255,255,.3)';X.fillRect(br.x-br.w/2+2,br.y-br.h/2+2,br.w-4,4);
X.strokeStyle='rgba(0,0,0,.6)';X.lineWidth=2;X.strokeRect(br.x-br.w/2,br.y-br.h/2,br.w,br.h)});
var p=paddle;X.save();X.shadowColor='#00ffff';X.shadowBlur=15;
var pg=X.createLinearGradient(0,p.y-p.h/2,0,p.y+p.h/2);pg.addColorStop(0,'#99ffff');pg.addColorStop(.5,'#00ffff');pg.addColorStop(1,'#0066aa');
X.fillStyle=pg;var rr=p.h/2;
X.beginPath();X.moveTo(p.x-p.w/2+rr,p.y-p.h/2);X.lineTo(p.x+p.w/2-rr,p.y-p.h/2);
X.arc(p.x+p.w/2-rr,p.y,rr,-Math.PI/2,Math.PI/2);X.lineTo(p.x-p.w/2+rr,p.y+p.h/2);
X.arc(p.x-p.w/2+rr,p.y,rr,Math.PI/2,-Math.PI/2);X.fill();X.restore();
balls.forEach(function(b){X.save();X.shadowColor='#fff';X.shadowBlur=18;
var g=X.createRadialGradient(b.x-b.r/3,b.y-b.r/3,1,b.x,b.y,b.r);g.addColorStop(0,'#fff');g.addColorStop(1,'#00ffff');
X.fillStyle=g;X.beginPath();X.arc(b.x,b.y,b.r,0,Math.PI*2);X.fill();X.restore()});
particles.forEach(function(pt){X.globalAlpha=pt.life/30;X.fillStyle=pt.color;X.fillRect(pt.x-2,pt.y-2,4,4)});
X.globalAlpha=1}

function loop(t){if(!run)return;var dt=Math.min(t-last,50);last=t;upd(dt);draw();raf(loop)}
function die(){run=false;if(score>best){best=score;try{localStorage.setItem('bs_b',best)}catch(e){}}
oh.innerHTML='GAME<br>OVER';oh.style.color='#ff3344';oh.style.textShadow='0 0 40px rgba(255,40,40,.8),4px 4px 0 #000';
fS.textContent='Score: '+score;fB.textContent='Best: '+best;show(ov2);show(ob2)}

window.addEventListener('keydown',function(e){if(e.key.startsWith('Arrow')){keys[e.key]=true;e.preventDefault()}if(e.code==='Space'){e.preventDefault();launch()}});
window.addEventListener('keyup',function(e){keys[e.key]=false});
C.addEventListener('pointerdown',function(e){if(e.target.tagName==='BUTTON')return;dragX=e.clientX;launch();e.preventDefault()});
C.addEventListener('pointermove',function(e){if(dragX!==null){dragX=e.clientX;e.preventDefault()}});
window.addEventListener('pointerup',function(){dragX=null});
document.getElementById('b1').addEventListener('click',function(e){e.stopPropagation();go()});
document.getElementById('b2').addEventListener('click',function(e){e.stopPropagation();go()});
window.addEventListener('resize',function(){if(!run)sz()});
document.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});
sz();
})();
</script>
</body>
</html>
