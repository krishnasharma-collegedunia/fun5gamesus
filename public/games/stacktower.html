<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Stack Tower</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{overscroll-behavior:none;overflow:hidden;touch-action:none;width:100%;height:100%;background:#2c3e50}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;touch-action:none}
.hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:center;padding:10px 14px;pointer-events:none;z-index:10}
.hb{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:6px 14px;text-align:center;min-width:70px}
.hbr{position:absolute;right:14px;top:10px}
.hl{color:rgba(255,255,255,.7);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:bold;font-family:Arial,sans-serif}
.hv{color:#fff;font-size:26px;font-weight:bold;line-height:1.1;font-family:Arial,sans-serif}
.ob{position:absolute;inset:0;background:rgba(0,0,0,.75);z-index:19}
.ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:20;padding:24px;text-align:center}
.ov.hidden,.ob.hidden{display:none}
.ov h1{font:900 clamp(40px,11vw,72px) Arial,sans-serif;color:#ff8c42;text-shadow:0 0 30px rgba(255,140,66,.6),3px 3px 0 #000;letter-spacing:2px;line-height:.95}
.sub{color:rgba(255,200,150,.75);font:14px Arial,sans-serif;letter-spacing:3px}
.fs{font:bold clamp(28px,8vw,48px) Arial,sans-serif;color:#ff8c42;letter-spacing:2px;text-shadow:2px 2px 0 #000}
.bst{color:#fff;font:clamp(14px,3.5vw,18px) Arial,sans-serif}
.btn{background:linear-gradient(180deg,#ff8c42,#e05a10);color:#fff;border:2px solid rgba(255,255,255,.4);padding:15px 50px;font:900 clamp(17px,4.5vw,22px) Arial,sans-serif;border-radius:50px;letter-spacing:3px;box-shadow:0 6px 28px rgba(255,100,30,.5);touch-action:manipulation;-webkit-appearance:none;cursor:pointer}
.btn:active{transform:scale(.96)}
.hn{color:rgba(255,200,150,.45);font:12px Arial,sans-serif;letter-spacing:2px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
<div class="hb"><div class="hl">Score</div><div class="hv" id="sc">0</div></div>
<div class="hb hbr"><div class="hl">Best</div><div class="hv" id="bs">0</div></div>
</div>
<div class="ob" id="ob1"></div>
<div class="ov" id="ov1"><h1>STACK<br>TOWER</h1><div class="sub">TAP TO STACK</div><button class="btn" id="b1" ontouchstart="">&#9654; PLAY</button><div class="hn">Stack as high as you can</div></div>
<div class="ob hidden" id="ob2"></div>
<div class="ov hidden" id="ov2"><h1 style="font-size:clamp(28px,7vw,48px)">GAME<br>OVER</h1><div class="fs" id="fS">0</div><div class="bst" id="fB">Best: 0</div><button class="btn" id="b2" ontouchstart="">PLAY AGAIN</button></div>
<script>
(function(){'use strict';
var C=document.getElementById('c'),X=C.getContext('2d'),W,H;
var scE=document.getElementById('sc'),bsE=document.getElementById('bs');
var fS=document.getElementById('fS'),fB=document.getElementById('fB');
var ov1=document.getElementById('ov1'),ob1=document.getElementById('ob1');
var ov2=document.getElementById('ov2'),ob2=document.getElementById('ob2');

var BLOCK_H=30;
var DEPTH=12;
var BASE_SPEED=2.2;
var SPEED_INC=0.05;
var PERFECT_THRESHOLD=5;

var blocks,moving,debris,score,best,scrollY,targetScrollY;
var gameState,lastTime,dir,speed;
var perfectPopups,comboCount;
var dyingTimer,rafId,startGrace;

try{best=parseInt(localStorage.getItem('st_b'))||0}catch(e){best=0}
bsE.textContent=best;

function sz(){W=C.width=window.innerWidth;H=C.height=window.innerHeight}
window.addEventListener('resize',sz);
sz();

function hide(e){e.classList.add('hidden')}
function show(e){e.classList.remove('hidden')}
function lerp(a,b,t){return a+(b-a)*t}

function hueForIndex(i){return(i*30+200)%360}

function blockColor(i){
var h=hueForIndex(i);
return{
top:'hsl('+h+',65%,60%)',
topLight:'hsl('+h+',70%,70%)',
side:'hsl('+h+',55%,35%)',
front:'hsl('+h+',50%,44%)'
};
}

function skyColors(s){
var t=Math.min(s/45,1);
var r1,g1,b1,r2,g2,b2;
if(t<0.25){
var p=t/0.25;
r1=lerp(45,65,p);g1=lerp(110,140,p);b1=lerp(205,200,p);
r2=lerp(25,45,p);g2=lerp(65,75,p);b2=lerp(130,150,p);
}else if(t<0.5){
var p=(t-0.25)/0.25;
r1=lerp(65,195,p);g1=lerp(140,110,p);b1=lerp(200,90,p);
r2=lerp(45,140,p);g2=lerp(75,55,p);b2=lerp(150,70,p);
}else if(t<0.75){
var p=(t-0.5)/0.25;
r1=lerp(195,150,p);g1=lerp(110,65,p);b1=lerp(90,170,p);
r2=lerp(140,95,p);g2=lerp(55,35,p);b2=lerp(70,140,p);
}else{
var p=(t-0.75)/0.25;
r1=lerp(150,200,p);g1=lerp(65,95,p);b1=lerp(170,155,p);
r2=lerp(95,150,p);g2=lerp(35,55,p);b2=lerp(140,115,p);
}
return{
t:'rgb('+Math.round(r1)+','+Math.round(g1)+','+Math.round(b1)+')',
b:'rgb('+Math.round(r2)+','+Math.round(g2)+','+Math.round(b2)+')'
};
}

/* y=0 is at the bottom of the screen. Block index 0 is at y=0.
   Block index n is at y = n * BLOCK_H.
   We draw from screen bottom upward.
   screenY = H - DEPTH - BLOCK_H - worldY + scrollY */
function worldToScreen(wy){
return H-DEPTH-BLOCK_H-wy+scrollY;
}

function rst(){
blocks=[];
debris=[];
perfectPopups=[];
score=0;
comboCount=0;
scrollY=0;
targetScrollY=0;
dir=1;
speed=BASE_SPEED;
dyingTimer=0;

var baseW=W*0.55;
if(baseW>210)baseW=210;
if(baseW<130)baseW=130;

blocks.push({
x:(W/2)-(baseW/2),
w:baseW,
level:0
});

spawnMoving();
scE.textContent=0;
}

function spawnMoving(){
var last=blocks[blocks.length-1];
var newLevel=blocks.length;
var startX;
if(dir>0){
startX=-last.w-10;
}else{
startX=W+10;
}
moving={
x:startX,
w:last.w,
level:newLevel
};
}

function go(){
sz();rst();
hide(ov1);hide(ob1);hide(ov2);hide(ob2);
gameState='play';
startGrace=performance.now();
lastTime=performance.now();
if(rafId)cancelAnimationFrame(rafId);
rafId=requestAnimationFrame(loop);
}

function endGame(){
gameState='over';
if(score>best){
best=score;
try{localStorage.setItem('st_b',String(best))}catch(e){}
}
bsE.textContent=best;
fS.textContent='Score: '+score;
fB.textContent='Best: '+best;
show(ov2);show(ob2);
}

function placePiece(){
if(!moving||gameState!=='play')return;
if(performance.now()-startGrace<200)return;
var prev=blocks[blocks.length-1];
var mx=moving.x;
var mw=moving.w;
var px=prev.x;
var pw=prev.w;

var overlapLeft=Math.max(mx,px);
var overlapRight=Math.min(mx+mw,px+pw);
var overlapW=overlapRight-overlapLeft;

if(overlapW<=0){
/* total miss */
var sy=worldToScreen(moving.level*BLOCK_H);
debris.push({
x:mx,sy:sy,w:mw,h:BLOCK_H,
vx:dir*3,vy:-2,rot:0,vr:dir*0.06,
idx:moving.level,alpha:1
});
moving=null;
comboCount=0;
gameState='dying';
dyingTimer=0;
return;
}

var isPerfect=false;
if(Math.abs(mx-px)<PERFECT_THRESHOLD){
overlapLeft=px;
overlapW=pw;
isPerfect=true;
}

blocks.push({
x:overlapLeft,
w:overlapW,
level:blocks.length
});

if(!isPerfect){
var sliceX,sliceW;
if(mx<px){
sliceX=mx;
sliceW=px-mx;
}else{
sliceX=overlapLeft+overlapW;
sliceW=(mx+mw)-(overlapLeft+overlapW);
}
if(sliceW>1){
var sliceDir=(sliceX<overlapLeft)?-1:1;
var sy=worldToScreen(moving.level*BLOCK_H);
debris.push({
x:sliceX,sy:sy,w:sliceW,h:BLOCK_H,
vx:sliceDir*3.5,vy:-1,
rot:0,vr:sliceDir*0.05,
idx:moving.level,alpha:1
});
}
comboCount=0;
}else{
comboCount++;
var sy=worldToScreen(moving.level*BLOCK_H);
perfectPopups.push({
x:overlapLeft+overlapW/2,
y:sy-10,
t:0,alpha:1,
combo:comboCount
});
}

score++;
scE.textContent=score;
speed=BASE_SPEED+score*SPEED_INC;
if(speed>13)speed=13;

/* scroll camera when tower grows past 40% of screen */
var towerTop=blocks.length*BLOCK_H;
var threshold=H*0.4;
if(towerTop>threshold){
targetScrollY=towerTop-threshold;
}

dir*=-1;
spawnMoving();
}

function drawBlock(sx,sy,bw,bh,idx,alpha){
var c=blockColor(idx);
var a=(alpha!==undefined)?alpha:1;
X.globalAlpha=a;

/* top face */
var grd=X.createLinearGradient(sx,sy,sx+bw,sy);
grd.addColorStop(0,c.topLight);
grd.addColorStop(1,c.top);
X.fillStyle=grd;
X.fillRect(sx,sy,bw,bh);

/* front face (bottom) */
X.fillStyle=c.front;
X.beginPath();
X.moveTo(sx,sy+bh);
X.lineTo(sx+DEPTH,sy+bh+DEPTH);
X.lineTo(sx+bw+DEPTH,sy+bh+DEPTH);
X.lineTo(sx+bw,sy+bh);
X.closePath();
X.fill();

/* right side face */
X.fillStyle=c.side;
X.beginPath();
X.moveTo(sx+bw,sy);
X.lineTo(sx+bw+DEPTH,sy+DEPTH);
X.lineTo(sx+bw+DEPTH,sy+bh+DEPTH);
X.lineTo(sx+bw,sy+bh);
X.closePath();
X.fill();

/* subtle highlight on top edge */
X.strokeStyle='rgba(255,255,255,0.15)';
X.lineWidth=0.5;
X.strokeRect(sx,sy,bw,bh);

X.globalAlpha=1;
}

function drawDebrisItem(d){
X.save();
var cx=d.x+d.w/2;
var cy=d.sy+d.h/2;
X.translate(cx,cy);
X.rotate(d.rot);
drawBlock(-d.w/2,-d.h/2,d.w,d.h,d.idx,d.alpha);
X.restore();
}

function loop(now){
var dt=(now-lastTime)/1000;
if(dt>0.06)dt=0.06;
lastTime=now;

/* update moving block */
if(gameState==='play'&&moving){
moving.x+=speed*dir;
if(dir>0&&moving.x>W+10){
moving.x=W+10;
dir=-1;
}else if(dir<0&&moving.x+moving.w<-10){
moving.x=-moving.w-10;
dir=1;
}
}

/* dying countdown */
if(gameState==='dying'){
dyingTimer+=dt;
if(dyingTimer>=1.0){
endGame();
}
}

/* smooth camera scroll */
scrollY+=(targetScrollY-scrollY)*0.07;

/* update debris physics (screen coords) */
for(var i=debris.length-1;i>=0;i--){
var d=debris[i];
d.vy+=15*dt;
d.x+=d.vx;
d.sy+=d.vy;
d.rot+=d.vr;
d.alpha-=0.7*dt;
if(d.alpha<=0||d.sy>H+200){
debris.splice(i,1);
}
}

/* update popups */
for(var i=perfectPopups.length-1;i>=0;i--){
var p=perfectPopups[i];
p.t+=dt;
p.y-=50*dt;
p.alpha=Math.max(0,1-p.t/1.0);
if(p.alpha<=0){
perfectPopups.splice(i,1);
}
}

/* --- DRAW --- */

/* sky gradient */
var sky=skyColors(score);
var grad=X.createLinearGradient(0,0,0,H);
grad.addColorStop(0,sky.t);
grad.addColorStop(1,sky.b);
X.fillStyle=grad;
X.fillRect(0,0,W,H);

/* draw stacked blocks */
for(var i=0;i<blocks.length;i++){
var b=blocks[i];
var sy=worldToScreen(b.level*BLOCK_H);
/* cull offscreen blocks */
if(sy+BLOCK_H+DEPTH<0||sy>H)continue;
drawBlock(b.x,sy,b.w,BLOCK_H,b.level);
}

/* draw moving block */
if(moving){
var sy=worldToScreen(moving.level*BLOCK_H);
drawBlock(moving.x,sy,moving.w,BLOCK_H,moving.level);
}

/* draw debris */
for(var i=0;i<debris.length;i++){
drawDebrisItem(debris[i]);
}

/* draw perfect popups */
for(var i=0;i<perfectPopups.length;i++){
var p=perfectPopups[i];
X.globalAlpha=p.alpha;
var fsz=Math.round(22+Math.min(p.t*15,8));
X.font='bold '+fsz+'px Arial,sans-serif';
X.textAlign='center';
X.textBaseline='middle';
X.shadowColor='rgba(255,220,60,0.9)';
X.shadowBlur=18;
X.fillStyle='#fff';
var txt=p.combo>1?'PERFECT x'+p.combo+'!':'PERFECT!';
X.fillText(txt,p.x,p.y);
X.shadowBlur=0;
X.globalAlpha=1;
}

/* draw large score in center if playing */
if(gameState==='play'||gameState==='dying'){
X.globalAlpha=0.12;
X.fillStyle='#fff';
X.font='bold '+Math.round(W*0.35)+'px Arial,sans-serif';
X.textAlign='center';
X.textBaseline='middle';
X.fillText(String(score),W/2,H*0.22);
X.globalAlpha=1;
}

if(gameState!=='over'){
rafId=requestAnimationFrame(loop);
}
}

C.addEventListener('pointerdown',function(e){
e.preventDefault();
placePiece();
});

document.getElementById('b1').addEventListener('click',function(e){
e.stopPropagation();
go();
});
document.getElementById('b2').addEventListener('click',function(e){
e.stopPropagation();
go();
});

document.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});

bsE.textContent=best;
})();
</script>
</body>
</html>
