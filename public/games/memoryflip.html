<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Memory Flip</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{overscroll-behavior:none;overflow:hidden;touch-action:none;width:100%;height:100%;background:#1a0933}
body{display:flex;flex-direction:column;align-items:center;font-family:Arial,sans-serif}
.head{width:100%;max-width:520px;padding:14px 6px 8px;display:flex;justify-content:space-between;gap:8px}
.sb{background:rgba(0,0,0,.5);border:2px solid rgba(255,100,255,.5);border-radius:12px;padding:6px 10px;text-align:center;min-width:66px;flex:1}
.sl{color:rgba(255,150,255,.85);font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:bold}
.sv{color:#fff;font-size:clamp(18px,5vw,24px);font-weight:bold;line-height:1.1;text-shadow:0 0 10px rgba(255,100,255,.7)}
.bw{flex:1;width:100%;max-width:520px;display:flex;align-items:center;justify-content:center;padding:10px}
.grid{display:grid;gap:8px;width:100%;max-width:460px}
.card{position:relative;cursor:pointer;border-radius:10px;transform-style:preserve-3d;transition:transform .5s;touch-action:manipulation;aspect-ratio:1}
.card.flipped{transform:rotateY(180deg)}
.card.matched{transform:rotateY(180deg);opacity:.55}
.face{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:10px;-webkit-backface-visibility:hidden;backface-visibility:hidden;box-shadow:0 4px 12px rgba(0,0,0,.5)}
.back{background:linear-gradient(135deg,#ff00ff,#7700cc);color:#fff;border:2px solid rgba(255,255,255,.4);font-size:clamp(28px,7vw,44px);font-weight:900}
.front{background:linear-gradient(135deg,#fff,#e0e0ff);transform:rotateY(180deg);color:#222;font-size:clamp(26px,7vw,44px)}
.ob{position:absolute;inset:0;background:rgba(10,5,30,.92);z-index:19}
.ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:20;padding:24px;text-align:center}
.ov.hidden,.ob.hidden{display:none}
.ov h1{font:900 clamp(44px,12vw,80px) Arial;color:#ff66ff;text-shadow:0 0 40px rgba(255,100,255,.8),4px 4px 0 #000;letter-spacing:3px;line-height:.95}
.sub{color:rgba(255,150,255,.85);font-size:14px;letter-spacing:3px}
.fs{font:bold clamp(22px,6vw,36px) Arial;color:#ff99ff;letter-spacing:1px;text-shadow:2px 2px 0 #000}
.bst{color:#fff;font:clamp(14px,3.5vw,18px) Arial}
.btn{background:linear-gradient(180deg,#ff66ff,#aa00cc);color:#fff;border:2px solid rgba(255,255,255,.4);padding:15px 50px;font:900 clamp(17px,4.5vw,22px) Arial;border-radius:50px;letter-spacing:3px;box-shadow:0 6px 28px rgba(200,0,255,.6);touch-action:manipulation;-webkit-appearance:none;cursor:pointer}
.btn:active{transform:scale(.96)}
.lvlsel{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.lb{background:rgba(255,255,255,.1);color:#fff;border:2px solid rgba(255,100,255,.5);padding:8px 16px;font-size:13px;font-weight:bold;font-family:inherit;border-radius:20px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none}
.lb.active{background:linear-gradient(180deg,#ff66ff,#aa00cc);border-color:#fff}
</style>
</head>
<body>
<div class="head">
<div class="sb"><div class="sl">Moves</div><div class="sv" id="sm">0</div></div>
<div class="sb"><div class="sl">Pairs</div><div class="sv" id="sp">0/0</div></div>
<div class="sb"><div class="sl">Time</div><div class="sv" id="st">0s</div></div>
</div>
<div class="bw"><div class="grid" id="grid"></div></div>
<div class="ob" id="ob1"></div>
<div class="ov" id="ov1"><h1>MEMORY<br>FLIP</h1><div class="sub">MATCH ALL PAIRS</div><div class="lvlsel"><button class="lb active" data-lvl="4" ontouchstart="">EASY 4x4</button><button class="lb" data-lvl="6" ontouchstart="">HARD 6x6</button></div><button class="btn" id="b1" ontouchstart="">▶ PLAY</button></div>
<div class="ob hidden" id="ob2"></div>
<div class="ov hidden" id="ov2"><h1>YOU<br>WIN!</h1><div class="fs" id="fSt">Moves: 0</div><div class="bst" id="fBt">Best: —</div><button class="btn" id="b2" ontouchstart="">PLAY AGAIN</button></div>
<script>
(function(){'use strict';
var gridE=document.getElementById('grid');
var smE=document.getElementById('sm'),spE=document.getElementById('sp'),stE=document.getElementById('st');
var fSt=document.getElementById('fSt'),fBt=document.getElementById('fBt');
var ov1=document.getElementById('ov1'),ob1=document.getElementById('ob1');
var ov2=document.getElementById('ov2'),ob2=document.getElementById('ob2');
var EMOJIS=['★','♥','♦','♣','♠','✿','❄','☀','☂','♪','☯','✈','⚓','⚡','❀','☘','♛','♞'];
var size=4,cards,flipped,matched,moves,startT,timerId,locked,running=false;

document.querySelectorAll('.lb').forEach(function(b){
b.addEventListener('click',function(){
document.querySelectorAll('.lb').forEach(function(x){x.classList.remove('active')});
b.classList.add('active');size=parseInt(b.dataset.lvl)})});

function go(){
ov1.classList.add('hidden');ob1.classList.add('hidden');
ov2.classList.add('hidden');ob2.classList.add('hidden');
build();running=true;startT=Date.now();clearInterval(timerId);
timerId=setInterval(function(){if(!running)return;stE.textContent=Math.floor((Date.now()-startT)/1000)+'s'},250)}

function build(){
var total=size*size,pairs=total/2,pool=EMOJIS.slice(0,pairs);
var deck=pool.concat(pool);
for(var i=deck.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=deck[i];deck[i]=deck[j];deck[j]=t}
gridE.innerHTML='';gridE.style.gridTemplateColumns='repeat('+size+',1fr)';
cards=[];flipped=[];matched=0;moves=0;locked=false;
smE.textContent=0;spE.textContent='0/'+pairs;stE.textContent='0s';
for(var i=0;i<deck.length;i++){
var c=document.createElement('div');c.className='card';
c.innerHTML='<div class="face back">?</div><div class="face front">'+deck[i]+'</div>';
(function(idx){c.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();flip(idx)})})(i);
gridE.appendChild(c);
cards.push({el:c,emoji:deck[i],matched:false,shown:false})}}

function flip(i){
if(locked||!running)return;var card=cards[i];if(card.shown||card.matched)return;
card.el.classList.add('flipped');card.shown=true;flipped.push(i);
if(flipped.length===2){moves++;smE.textContent=moves;
var a=flipped[0],b=flipped[1];
if(cards[a].emoji===cards[b].emoji){
cards[a].matched=true;cards[b].matched=true;
cards[a].el.classList.add('matched');cards[b].el.classList.add('matched');
matched++;var pairs=(size*size)/2;spE.textContent=matched+'/'+pairs;
flipped=[];if(matched===pairs)win()}
else{locked=true;setTimeout(function(){
cards[a].el.classList.remove('flipped');cards[b].el.classList.remove('flipped');
cards[a].shown=false;cards[b].shown=false;flipped=[];locked=false},700)}}}

function win(){
running=false;clearInterval(timerId);
var secs=Math.floor((Date.now()-startT)/1000),key='mf_b_'+size,bestStr='—';
try{var prev=JSON.parse(localStorage.getItem(key)||'null');
if(!prev||moves<prev.m||(moves===prev.m&&secs<prev.t)){
localStorage.setItem(key,JSON.stringify({m:moves,t:secs}));bestStr=moves+' moves · '+secs+'s (NEW!)'}
else bestStr=prev.m+' moves · '+prev.t+'s'}catch(e){}
fSt.textContent='Moves: '+moves+' · Time: '+secs+'s';fBt.textContent='Best: '+bestStr;
setTimeout(function(){ov2.classList.remove('hidden');ob2.classList.remove('hidden')},500)}

document.getElementById('b1').addEventListener('click',function(e){e.stopPropagation();go()});
document.getElementById('b2').addEventListener('click',function(e){e.stopPropagation();go()});
document.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});
})();
</script>
</body>
</html>
