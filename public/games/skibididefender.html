<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Skibidi Defender</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{overscroll-behavior:none;overflow:hidden;touch-action:none;width:100%;height:100%;background:#1a1240;font-family:Arial,sans-serif}
body{display:flex;align-items:center;justify-content:center}
canvas{display:block;touch-action:none}
.hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:8px 10px;pointer-events:none;z-index:10;gap:6px;flex-wrap:wrap}
.hb{background:rgba(0,0,0,.55);border:2px solid rgba(255,210,80,.55);border-radius:10px;padding:5px 9px;text-align:center;min-width:54px}
.hl{color:rgba(255,210,80,.85);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:bold}
.hv{color:#fff;font-size:18px;font-weight:bold;line-height:1.1;text-shadow:0 0 8px rgba(255,210,80,.7)}
.ob{position:absolute;inset:0;background:rgba(20,10,50,.93);z-index:19}
.ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20;padding:20px;text-align:center}
.ov.hidden,.ob.hidden{display:none}
.ov h1{font:900 clamp(38px,11vw,72px) Arial;color:#ffd24f;text-shadow:0 0 36px rgba(255,210,80,.8),4px 4px 0 #000;letter-spacing:2px;line-height:.95}
.sub{color:rgba(255,210,80,.8);font:13px Arial;letter-spacing:2px}
.fs{font:bold clamp(24px,7vw,38px) Arial;color:#ffd24f;letter-spacing:2px;text-shadow:2px 2px 0 #000}
.bst{color:#fff;font:clamp(13px,3.4vw,17px) Arial}
.btn{background:linear-gradient(180deg,#ffd24f,#cc8800);color:#1a1240;border:2px solid rgba(255,255,255,.4);padding:14px 44px;font:900 clamp(16px,4.4vw,21px) Arial;border-radius:46px;letter-spacing:2px;box-shadow:0 6px 24px rgba(255,210,80,.5);touch-action:manipulation;-webkit-appearance:none;cursor:pointer}
.btn:active{transform:scale(.96)}
.hn{color:rgba(255,210,80,.5);font:11px Arial;letter-spacing:2px}
.shop{display:flex;flex-direction:column;gap:10px;width:min(320px,90vw)}
.upg{background:linear-gradient(180deg,#3a2870,#241650);border:2px solid #ffd24f;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;color:#fff;font-family:Arial;text-align:left}
.upg:active{transform:scale(.97)}
.upg.dis{opacity:.45;cursor:not-allowed}
.upi{font-size:30px;width:42px;text-align:center}
.upn{flex:1}
.upt{font-weight:bold;font-size:14px;color:#ffd24f;letter-spacing:1px}
.upd{font-size:11px;color:#cdb;margin-top:2px}
.upc{font-weight:bold;color:#ffd24f;font-size:15px}
.heart{display:inline-block}
.bossText{position:absolute;left:0;right:0;top:38%;text-align:center;color:#ff4070;font:900 clamp(34px,9vw,60px) Arial;text-shadow:0 0 30px rgba(255,40,80,.9),4px 4px 0 #000;letter-spacing:3px;z-index:15;pointer-events:none;opacity:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
<div class="hb"><div class="hl">Score</div><div class="hv" id="sc">0</div></div>
<div class="hb"><div class="hl">Coins</div><div class="hv" id="co">0</div></div>
<div class="hb"><div class="hl">Lives</div><div class="hv" id="lv">3</div></div>
<div class="hb"><div class="hl">Wave</div><div class="hv" id="wv">1</div></div>
</div>
<div class="bossText" id="bt">BOSS WAVE!</div>
<div class="ob" id="ob1"></div>
<div class="ov" id="ov1">
<h1>SKIBIDI<br>DEFENDER</h1>
<div class="sub">TAP ENEMIES TO BLAST</div>
<button class="btn" id="b1" ontouchstart="">PLAY</button>
<div class="hn" id="bw1">Best Wave: 0</div>
</div>
<div class="ob hidden" id="ob2"></div>
<div class="ov hidden" id="ov2">
<h1 style="color:#ff4070;text-shadow:0 0 36px rgba(255,40,80,.8),4px 4px 0 #000">GAME<br>OVER</h1>
<div class="fs" id="fS">Wave 0</div>
<div class="bst" id="fB">Best: 0</div>
<button class="btn" id="b2" ontouchstart="">PLAY AGAIN</button>
</div>
<div class="ob hidden" id="ob3"></div>
<div class="ov hidden" id="ov3">
<h1 style="font-size:clamp(28px,7vw,44px)">UPGRADE!</h1>
<div class="sub" id="us">Coins: 0</div>
<div class="shop" id="shop"></div>
<button class="btn" id="b3" ontouchstart="">CONTINUE</button>
</div>
<script>
(function(){'use strict';
var C=document.getElementById('c'),X=C.getContext('2d'),W,H;
var scE=document.getElementById('sc'),coE=document.getElementById('co'),lvE=document.getElementById('lv'),wvE=document.getElementById('wv');
var fS=document.getElementById('fS'),fB=document.getElementById('fB'),bw1=document.getElementById('bw1');
var ov1=document.getElementById('ov1'),ob1=document.getElementById('ob1');
var ov2=document.getElementById('ov2'),ob2=document.getElementById('ob2');
var ov3=document.getElementById('ov3'),ob3=document.getElementById('ob3');
var btxt=document.getElementById('bt'),us=document.getElementById('us'),shop=document.getElementById('shop');

var bestWave=0,totalCoins=0;
try{bestWave=parseInt(localStorage.getItem('sd_best_wave'))||0}catch(e){}
try{totalCoins=parseInt(localStorage.getItem('sd_total_coins'))||0}catch(e){}

var run=false,last=0,gameOver=false;
var score,coins,lives,wave,player;
var enemies,bullets,particles,coinDrops,popups,clouds;
var spawnTimer,spawnsLeft,waveActive,waveDelay;
var shake=0,bossIntroTime=0,playerFlash=0;
var dmg=10,fireRate=20,maxLives=3; // upgrades
var fireCooldown=0,targetEnemy=null;

function sz(){W=C.width=window.innerWidth;H=C.height=window.innerHeight}
function rnd(a,b){return a+Math.random()*(b-a)}
function hide(e){e.classList.add('hidden')}
function show(e){e.classList.remove('hidden')}
function raf(f){requestAnimationFrame(f)}

function mkClouds(){
  clouds=[];
  for(var i=0;i<6;i++){
    clouds.push({x:Math.random()*W,y:rnd(20,H*0.4),s:rnd(0.6,1.4),v:rnd(0.15,0.45)});
  }
}

function rst(){
  score=0;coins=0;lives=maxLives;wave=1;
  enemies=[];bullets=[];particles=[];coinDrops=[];popups=[];
  spawnTimer=60;spawnsLeft=enemyCount(1);waveActive=true;waveDelay=0;
  player={x:60,y:H-120,gunAng:0};
  shake=0;bossIntroTime=0;playerFlash=0;
  fireCooldown=0;targetEnemy=null;
  gameOver=false;
  mkClouds();
  updHud();
}

function updHud(){
  scE.textContent=score;
  coE.textContent=coins;
  lvE.textContent='♥'.repeat(Math.max(0,lives))||'0';
  wvE.textContent=wave;
}

function enemyCount(w){
  if(w%5===0)return 1; // boss waves
  return Math.min(20,3+Math.floor(w*1.5));
}

function pickEnemyType(w){
  if(w%5===0)return 'boss';
  var r=Math.random();
  if(w<=2){return r<0.85?'small':'medium'}
  if(w<=4){return r<0.5?'small':r<0.85?'medium':'big'}
  if(w<=8){return r<0.35?'small':r<0.7?'medium':'big'}
  return r<0.25?'small':r<0.6?'medium':'big';
}

function spawnEnemy(){
  var t=pickEnemyType(wave);
  var speedBoost=1+(wave-1)*0.06;
  var e={type:t,x:W+40,y:H-110,vy:0,t:0,wob:Math.random()*Math.PI*2,hitFlash:0};
  if(t==='small'){e.hp=1;e.maxHp=1;e.r=20;e.vx=-(rnd(0.7,1.0))*speedBoost;e.score=8;e.coinCh=0.6;e.coinV=1}
  else if(t==='medium'){e.hp=3;e.maxHp=3;e.r=26;e.vx=-(rnd(0.5,0.8))*speedBoost;e.score=18;e.coinCh=0.8;e.coinV=2}
  else if(t==='big'){e.hp=5;e.maxHp=5;e.r=34;e.vx=-(rnd(0.85,1.15))*speedBoost;e.score=35;e.coinCh=0.9;e.coinV=3}
  else if(t==='boss'){e.hp=15+wave;e.maxHp=e.hp;e.r=70;e.vx=-(rnd(0.3,0.45))*speedBoost;e.score=200;e.coinCh=1;e.coinV=15;e.boss=true}
  enemies.push(e);
}

function tapAt(x,y){
  // hit closest enemy under tap, or auto-target nearest
  var hit=null,bestD=Infinity;
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i];
    var dx=e.x-x,dy=(e.y-e.r*0.6)-y;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<e.r+18 && d<bestD){bestD=d;hit=e}
  }
  if(!hit){
    // tap miss: still try auto-target nearest enemy onscreen for continuous fire
    for(var j=0;j<enemies.length;j++){
      var en=enemies[j];
      if(en.x<W+30){
        var dx2=en.x-x,dy2=en.y-y;
        var d2=Math.sqrt(dx2*dx2+dy2*dy2);
        if(d2<bestD){bestD=d2;hit=en}
      }
    }
  }
  if(hit){
    targetEnemy=hit;
    fireCooldown=0; // immediate shot
  }
}

function fireShot(target){
  if(!target)return;
  var sx=player.x+22,sy=player.y-26;
  var tx=target.x,ty=target.y-target.r*0.6;
  bullets.push({x:sx,y:sy,tx:tx,ty:ty,life:0,maxLife:8,target:target});
  // particle muzzle flash
  for(var i=0;i<5;i++){
    particles.push({x:sx,y:sy,vx:rnd(2,5),vy:rnd(-2,2),life:12,r:rnd(2,4),c:'#ffd24f'});
  }
}

function applyDamage(e,d){
  e.hp-=d;
  e.hitFlash=8;
  popups.push({x:e.x,y:e.y-e.r-10,vy:-1.5,life:30,text:'-'+d,c:'#ff4070'});
  // hit splash particles
  for(var i=0;i<6;i++){
    particles.push({x:e.x,y:e.y-e.r*0.5,vx:rnd(-3,3),vy:rnd(-4,-1),life:20,r:rnd(2,4),c:'#ff3050',gravity:0.2});
  }
  if(e.hp<=0){
    defeatEnemy(e);
  }
}

function defeatEnemy(e){
  score+=e.score;
  if(Math.random()<e.coinCh){
    for(var k=0;k<e.coinV;k++){
      coinDrops.push({x:e.x+rnd(-10,10),y:e.y-e.r*0.5,vx:rnd(-2,2),vy:rnd(-6,-3),life:0,collected:false,sparkle:0});
    }
  }
  // explosion particles
  for(var i=0;i<22;i++){
    particles.push({x:e.x,y:e.y-e.r*0.5,vx:rnd(-6,6),vy:rnd(-7,-1),life:30+Math.random()*15,r:rnd(2,5),c:i%2?'#ffffff':'#bbbbbb',gravity:0.25});
  }
  for(var j=0;j<10;j++){
    particles.push({x:e.x,y:e.y-e.r*0.5,vx:rnd(-5,5),vy:rnd(-6,-1),life:25,r:rnd(3,6),c:'#ff7090',gravity:0.2});
  }
  if(e.boss)shake=18;
  else shake=Math.max(shake,5);
  // remove from array
  var idx=enemies.indexOf(e);
  if(idx>-1)enemies.splice(idx,1);
  if(targetEnemy===e)targetEnemy=null;
  updHud();
}

function loseLife(){
  lives--;
  shake=14;
  playerFlash=18;
  updHud();
  if(lives<=0){
    endGame();
  }
}

function endGame(){
  run=false;gameOver=true;
  if(wave>bestWave){bestWave=wave;try{localStorage.setItem('sd_best_wave',bestWave)}catch(e){}}
  totalCoins+=coins;try{localStorage.setItem('sd_total_coins',totalCoins)}catch(e){}
  fS.textContent='Wave '+wave+' · Score '+score;
  fB.textContent='Best Wave: '+bestWave+' · Total Coins: '+totalCoins;
  show(ob2);show(ov2);
}

function nextWave(){
  wave++;
  showShop();
}

function showShop(){
  run=false;
  us.textContent='Coins: '+coins;
  shop.innerHTML='';
  var opts=[
    {id:'dmg',ic:'+',t:'DAMAGE +5',d:'Now '+dmg+' → '+(dmg+5),cost:5+Math.floor(dmg/3)},
    {id:'fr',ic:'>',t:'FIRE RATE',d:'Faster shots',cost:6+Math.max(0,(20-fireRate))},
    {id:'sh',ic:'♥',t:'EXTRA LIFE',d:'Restore +1 life (max 5)',cost:10}
  ];
  opts.forEach(function(o){
    var el=document.createElement('div');
    el.className='upg'+(coins<o.cost||(o.id==='sh'&&lives>=5)?' dis':'');
    el.innerHTML='<div class="upi">'+o.ic+'</div><div class="upn"><div class="upt">'+o.t+'</div><div class="upd">'+o.d+'</div></div><div class="upc">'+o.cost+'c</div>';
    el.addEventListener('click',function(){
      if(coins<o.cost)return;
      if(o.id==='sh'&&lives>=5)return;
      coins-=o.cost;
      if(o.id==='dmg')dmg+=5;
      else if(o.id==='fr')fireRate=Math.max(6,fireRate-3);
      else if(o.id==='sh'){lives=Math.min(5,lives+1)}
      updHud();
      showShop(); // refresh
    });
    shop.appendChild(el);
  });
  show(ob3);show(ov3);
}

function startNextWave(){
  hide(ob3);hide(ov3);
  spawnTimer=wave%5===0?80:50;
  spawnsLeft=enemyCount(wave);
  waveActive=true;
  if(wave%5===0){
    bossIntroTime=90;
    shake=10;
    btxt.style.opacity='1';
    btxt.style.transition='opacity 0.4s';
    setTimeout(function(){btxt.style.opacity='0'},2000);
  }
  run=true;last=performance.now();raf(loop);
}

function startGame(){
  sz();rst();
  hide(ov1);hide(ob1);hide(ov2);hide(ob2);
  run=true;last=performance.now();raf(loop);
}

// drawing
function drawBg(){
  // sky gradient
  var g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#5a40b8');
  g.addColorStop(0.6,'#8a6bd8');
  g.addColorStop(1,'#a888e8');
  X.fillStyle=g;X.fillRect(0,0,W,H);
  // sun
  X.fillStyle='rgba(255,230,160,0.5)';
  X.beginPath();X.arc(W*0.78,H*0.18,42,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,230,160,0.9)';
  X.beginPath();X.arc(W*0.78,H*0.18,28,0,Math.PI*2);X.fill();
  // clouds
  for(var i=0;i<clouds.length;i++){
    var c=clouds[i];
    drawCloud(c.x,c.y,c.s);
  }
  // ground
  var groundY=H-80;
  var gr=X.createLinearGradient(0,groundY,0,H);
  gr.addColorStop(0,'#4caf50');
  gr.addColorStop(1,'#2e7d32');
  X.fillStyle=gr;X.fillRect(0,groundY,W,80);
  // grass blades
  X.fillStyle='#388e3c';
  for(var k=0;k<W;k+=14){
    X.beginPath();
    X.moveTo(k,groundY);
    X.lineTo(k+5,groundY-6);
    X.lineTo(k+10,groundY);
    X.fill();
  }
  // dirt line
  X.strokeStyle='rgba(0,0,0,0.15)';
  X.lineWidth=2;X.beginPath();X.moveTo(0,groundY+18);X.lineTo(W,groundY+18);X.stroke();
}

function drawCloud(x,y,s){
  X.fillStyle='rgba(255,255,255,0.85)';
  X.beginPath();
  X.arc(x,y,18*s,0,Math.PI*2);
  X.arc(x+18*s,y-6*s,22*s,0,Math.PI*2);
  X.arc(x+38*s,y,18*s,0,Math.PI*2);
  X.arc(x+22*s,y+6*s,18*s,0,Math.PI*2);
  X.fill();
}

function drawPlayer(){
  var px=player.x,py=player.y;
  // shadow
  X.fillStyle='rgba(0,0,0,0.3)';
  X.beginPath();X.ellipse(px,py+10,22,6,0,0,Math.PI*2);X.fill();
  // body (stick figure)
  if(playerFlash>0&&playerFlash%4<2){X.globalAlpha=0.5}
  // legs
  X.strokeStyle='#3a2c20';X.lineWidth=4;X.lineCap='round';
  X.beginPath();X.moveTo(px-6,py);X.lineTo(px-8,py+18);X.stroke();
  X.beginPath();X.moveTo(px+6,py);X.lineTo(px+8,py+18);X.stroke();
  // body
  X.strokeStyle='#5a8a3a';X.lineWidth=10;
  X.beginPath();X.moveTo(px,py-5);X.lineTo(px,py+2);X.stroke();
  // head
  X.fillStyle='#ffd5a0';
  X.beginPath();X.arc(px,py-20,11,0,Math.PI*2);X.fill();
  // helmet
  X.fillStyle='#3d6f2f';
  X.beginPath();
  X.arc(px,py-22,13,Math.PI,0);
  X.lineTo(px+13,py-18);
  X.lineTo(px-13,py-18);
  X.closePath();X.fill();
  // helmet strap
  X.strokeStyle='#2a4f1e';X.lineWidth=2;
  X.beginPath();X.arc(px,py-22,13,Math.PI,0);X.stroke();
  // eyes
  X.fillStyle='#000';
  X.beginPath();X.arc(px-3,py-20,1.5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(px+3,py-20,1.5,0,Math.PI*2);X.fill();
  // gun (auto-aim toward target)
  var ang=0;
  if(targetEnemy){ang=Math.atan2((targetEnemy.y-targetEnemy.r*0.6)-(py-26),targetEnemy.x-(px+22))}
  player.gunAng=ang;
  X.save();
  X.translate(px+10,py-12);
  X.rotate(ang);
  // gun body
  X.fillStyle='#444';
  X.fillRect(0,-4,28,8);
  // gun tip
  X.fillStyle='#222';
  X.fillRect(24,-5,6,10);
  // sight
  X.fillStyle='#888';
  X.fillRect(8,-6,3,2);
  X.restore();
  // arms gripping gun
  X.strokeStyle='#ffd5a0';X.lineWidth=4;
  X.beginPath();X.moveTo(px,py-10);X.lineTo(px+10,py-12);X.stroke();
  X.globalAlpha=1;
}

function drawToilet(e){
  var x=e.x,y=e.y;
  var r=e.r;
  var wob=Math.sin(e.t*0.15+e.wob)*2;
  if(e.hitFlash>0){X.filter='brightness(2)'}
  // shadow
  X.filter=e.hitFlash>0?'brightness(2)':'none';
  X.fillStyle='rgba(0,0,0,0.3)';
  X.beginPath();X.ellipse(x,y+8,r*0.8,r*0.18,0,0,Math.PI*2);X.fill();
  if(e.boss){drawBoss(e,x,y+wob,r);X.filter='none';return}
  // legs (small stubby)
  X.fillStyle='#888';
  X.fillRect(x-r*0.5,y-2,r*0.25,8);
  X.fillRect(x+r*0.25,y-2,r*0.25,8);
  // tank back (toilet tank)
  X.fillStyle='#f0f0f0';
  X.fillRect(x+r*0.3,y-r*1.6+wob,r*0.7,r*1.0);
  X.strokeStyle='#aaa';X.lineWidth=2;
  X.strokeRect(x+r*0.3,y-r*1.6+wob,r*0.7,r*1.0);
  // bowl (rounded body)
  X.fillStyle='#ffffff';
  X.beginPath();
  X.ellipse(x,y-r*0.5+wob,r*0.95,r*0.7,0,0,Math.PI*2);
  X.fill();
  X.strokeStyle='#bbb';X.lineWidth=2;X.stroke();
  // bowl rim
  X.fillStyle='#e0e0e0';
  X.beginPath();
  X.ellipse(x,y-r*0.85+wob,r*0.85,r*0.18,0,0,Math.PI*2);
  X.fill();
  // dark bowl interior
  X.fillStyle='#333';
  X.beginPath();
  X.ellipse(x,y-r*0.85+wob,r*0.65,r*0.13,0,0,Math.PI*2);
  X.fill();
  // type-specific face
  if(e.type==='small')drawFaceSmall(x,y-r*0.45+wob,r);
  else if(e.type==='medium')drawFaceMedium(x,y-r*0.45+wob,r);
  else if(e.type==='big')drawFaceBig(x,y-r*0.45+wob,r);
  // hp bar
  if(e.maxHp>1){
    var bw=r*1.4,bh=4;
    X.fillStyle='rgba(0,0,0,0.6)';
    X.fillRect(x-bw/2,y-r*1.9+wob,bw,bh);
    X.fillStyle=e.hp/e.maxHp>0.5?'#4caf50':e.hp/e.maxHp>0.25?'#ffc107':'#f44336';
    X.fillRect(x-bw/2,y-r*1.9+wob,bw*(e.hp/e.maxHp),bh);
  }
  X.filter='none';
}

function drawFaceSmall(x,y,r){
  // cute baby eyes
  X.fillStyle='#000';
  X.beginPath();X.arc(x-r*0.25,y,r*0.13,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(x+r*0.25,y,r*0.13,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';
  X.beginPath();X.arc(x-r*0.21,y-r*0.04,r*0.05,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(x+r*0.29,y-r*0.04,r*0.05,0,Math.PI*2);X.fill();
  // tiny mouth
  X.strokeStyle='#000';X.lineWidth=2;
  X.beginPath();X.arc(x,y+r*0.18,r*0.08,0,Math.PI);X.stroke();
  // blush
  X.fillStyle='rgba(255,140,140,0.5)';
  X.beginPath();X.arc(x-r*0.45,y+r*0.1,r*0.12,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(x+r*0.45,y+r*0.1,r*0.12,0,Math.PI*2);X.fill();
}

function drawFaceMedium(x,y,r){
  // grumpy angled eyes
  X.fillStyle='#000';
  X.save();
  X.translate(x-r*0.27,y);X.rotate(-0.3);
  X.fillRect(-r*0.18,-r*0.06,r*0.32,r*0.12);
  X.restore();
  X.save();
  X.translate(x+r*0.27,y);X.rotate(0.3);
  X.fillRect(-r*0.18,-r*0.06,r*0.32,r*0.12);
  X.restore();
  // angry mouth (frown)
  X.strokeStyle='#000';X.lineWidth=2.5;X.lineCap='round';
  X.beginPath();
  X.moveTo(x-r*0.2,y+r*0.3);
  X.quadraticCurveTo(x,y+r*0.18,x+r*0.2,y+r*0.3);
  X.stroke();
  // teeth gritted
  X.fillStyle='#fff';
  X.fillRect(x-r*0.12,y+r*0.25,r*0.06,r*0.08);
  X.fillRect(x-r*0.02,y+r*0.25,r*0.06,r*0.08);
  X.fillRect(x+r*0.08,y+r*0.25,r*0.06,r*0.08);
}

function drawFaceBig(x,y,r){
  // sunglasses
  X.fillStyle='#000';
  X.fillRect(x-r*0.5,y-r*0.08,r*0.36,r*0.18);
  X.fillRect(x+r*0.14,y-r*0.08,r*0.36,r*0.18);
  // glasses bridge
  X.fillRect(x-r*0.16,y-r*0.02,r*0.32,r*0.04);
  // glasses frame
  X.strokeStyle='#444';X.lineWidth=2;
  X.strokeRect(x-r*0.5,y-r*0.08,r*0.36,r*0.18);
  X.strokeRect(x+r*0.14,y-r*0.08,r*0.36,r*0.18);
  // sneer mouth
  X.strokeStyle='#000';X.lineWidth=3;X.lineCap='round';
  X.beginPath();
  X.moveTo(x-r*0.22,y+r*0.28);
  X.lineTo(x+r*0.22,y+r*0.22);
  X.stroke();
  // shine on sunglasses
  X.fillStyle='rgba(255,255,255,0.4)';
  X.fillRect(x-r*0.42,y-r*0.04,r*0.08,r*0.06);
  X.fillRect(x+r*0.22,y-r*0.04,r*0.08,r*0.06);
}

function drawBoss(e,x,y,r){
  var wob=Math.sin(e.t*0.1)*3;
  // legs
  X.fillStyle='#666';
  X.fillRect(x-r*0.55,y-2,r*0.3,12);
  X.fillRect(x+r*0.25,y-2,r*0.3,12);
  // tank
  X.fillStyle='#e8e8e8';
  X.fillRect(x+r*0.3,y-r*1.7+wob,r*0.75,r*1.1);
  X.strokeStyle='#888';X.lineWidth=3;
  X.strokeRect(x+r*0.3,y-r*1.7+wob,r*0.75,r*1.1);
  // crown on top of tank
  X.fillStyle='#ffd24f';
  X.beginPath();
  X.moveTo(x+r*0.3,y-r*1.7+wob);
  X.lineTo(x+r*0.45,y-r*2.0+wob);
  X.lineTo(x+r*0.6,y-r*1.7+wob);
  X.lineTo(x+r*0.75,y-r*2.0+wob);
  X.lineTo(x+r*0.9,y-r*1.7+wob);
  X.lineTo(x+r*1.05,y-r*2.0+wob);
  X.lineTo(x+r*1.05,y-r*1.6+wob);
  X.lineTo(x+r*0.3,y-r*1.6+wob);
  X.closePath();X.fill();
  X.strokeStyle='#aa7700';X.lineWidth=2;X.stroke();
  // gem on crown
  X.fillStyle='#ff4070';
  X.beginPath();X.arc(x+r*0.7,y-r*1.85+wob,r*0.06,0,Math.PI*2);X.fill();
  // body (huge bowl)
  X.fillStyle='#ffffff';
  X.beginPath();
  X.ellipse(x,y-r*0.55+wob,r*1.0,r*0.78,0,0,Math.PI*2);
  X.fill();
  X.strokeStyle='#999';X.lineWidth=3;X.stroke();
  // bowl rim
  X.fillStyle='#d0d0d0';
  X.beginPath();X.ellipse(x,y-r*0.95+wob,r*0.9,r*0.2,0,0,Math.PI*2);X.fill();
  X.fillStyle='#222';
  X.beginPath();X.ellipse(x,y-r*0.95+wob,r*0.7,r*0.14,0,0,Math.PI*2);X.fill();
  // boss face: red eyes, evil grin
  var fy=y-r*0.5+wob;
  // eyes (glowing red)
  X.fillStyle='rgba(255,30,30,0.4)';
  X.beginPath();X.arc(x-r*0.3,fy,r*0.25,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(x+r*0.3,fy,r*0.25,0,Math.PI*2);X.fill();
  X.fillStyle='#ff2040';
  X.beginPath();X.arc(x-r*0.3,fy,r*0.16,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(x+r*0.3,fy,r*0.16,0,Math.PI*2);X.fill();
  X.fillStyle='#000';
  X.beginPath();X.arc(x-r*0.3,fy,r*0.07,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(x+r*0.3,fy,r*0.07,0,Math.PI*2);X.fill();
  // evil grin with teeth
  X.fillStyle='#000';
  X.beginPath();
  X.moveTo(x-r*0.4,fy+r*0.25);
  X.quadraticCurveTo(x,fy+r*0.55,x+r*0.4,fy+r*0.25);
  X.lineTo(x+r*0.35,fy+r*0.2);
  X.quadraticCurveTo(x,fy+r*0.4,x-r*0.35,fy+r*0.2);
  X.closePath();X.fill();
  // teeth
  X.fillStyle='#fff';
  for(var i=-3;i<=3;i++){
    var tx=x+i*r*0.1;
    X.beginPath();
    X.moveTo(tx-r*0.04,fy+r*0.25);
    X.lineTo(tx,fy+r*0.4);
    X.lineTo(tx+r*0.04,fy+r*0.25);
    X.closePath();X.fill();
  }
  // hp bar
  var bw=r*2.0,bh=8;
  X.fillStyle='rgba(0,0,0,0.7)';
  X.fillRect(x-bw/2,y-r*2.3+wob,bw,bh);
  X.fillStyle=e.hp/e.maxHp>0.5?'#ff4070':'#ff0040';
  X.fillRect(x-bw/2,y-r*2.3+wob,bw*(e.hp/e.maxHp),bh);
  X.strokeStyle='#fff';X.lineWidth=1;
  X.strokeRect(x-bw/2,y-r*2.3+wob,bw,bh);
}

function drawBullet(b){
  var t=b.life/b.maxLife;
  var sx=player.x+22,sy=player.y-26;
  var cx=sx+(b.tx-sx)*t,cy=sy+(b.ty-sy)*t;
  // trail line
  var grad=X.createLinearGradient(sx,sy,cx,cy);
  grad.addColorStop(0,'rgba(255,210,80,0)');
  grad.addColorStop(1,'rgba(255,140,40,1)');
  X.strokeStyle=grad;X.lineWidth=4;X.lineCap='round';
  X.beginPath();X.moveTo(sx,sy);X.lineTo(cx,cy);X.stroke();
  // bullet head
  X.fillStyle='#fff';
  X.beginPath();X.arc(cx,cy,4,0,Math.PI*2);X.fill();
  X.fillStyle='#ffd24f';
  X.beginPath();X.arc(cx,cy,2.5,0,Math.PI*2);X.fill();
}

function drawCoin(c){
  X.save();
  X.translate(c.x,c.y);
  var sc=Math.cos(c.life*0.2);
  X.scale(Math.abs(sc)*0.6+0.4,1);
  X.fillStyle='#ffd24f';
  X.beginPath();X.arc(0,0,8,0,Math.PI*2);X.fill();
  X.fillStyle='#cc8800';
  X.beginPath();X.arc(0,0,8,0,Math.PI*2);X.stroke();
  X.fillStyle='#fff8dc';
  X.font='bold 11px Arial';X.textAlign='center';X.textBaseline='middle';
  X.fillText('$',0,0);
  X.restore();
  // sparkle
  if(c.sparkle>0){
    X.fillStyle='rgba(255,255,255,'+(c.sparkle/20)+')';
    X.beginPath();X.arc(c.x+rnd(-10,10),c.y+rnd(-10,10),2,0,Math.PI*2);X.fill();
  }
}

function loop(now){
  if(!run){return}
  var dt=Math.min(33,now-last);last=now;
  X.save();
  if(shake>0){X.translate(rnd(-shake,shake),rnd(-shake,shake));shake*=0.9;if(shake<0.4)shake=0}
  drawBg();
  // update clouds
  for(var i=0;i<clouds.length;i++){
    clouds[i].x-=clouds[i].v;
    if(clouds[i].x<-80)clouds[i].x=W+30;
  }
  // spawn enemies
  if(waveActive&&spawnsLeft>0&&bossIntroTime<=0){
    spawnTimer--;
    if(spawnTimer<=0){
      spawnEnemy();
      spawnsLeft--;
      var base=Math.max(20,80-wave*4);
      spawnTimer=base+Math.random()*30;
      if(wave%5===0)spawnTimer=999; // single boss
    }
  }
  if(bossIntroTime>0)bossIntroTime--;
  // wave end check
  if(waveActive&&spawnsLeft<=0&&enemies.length===0){
    waveActive=false;
    waveDelay=40;
  }
  if(!waveActive){
    waveDelay--;
    if(waveDelay<=0){
      // proceed to upgrade shop
      run=false;
      X.restore();
      nextWave();
      return;
    }
  }
  // update enemies
  for(var i=enemies.length-1;i>=0;i--){
    var e=enemies[i];
    e.t++;
    e.x+=e.vx;
    if(e.hitFlash>0)e.hitFlash--;
    // check reached player
    if(e.x<player.x+e.r*0.5){
      enemies.splice(i,1);
      if(targetEnemy===e)targetEnemy=null;
      loseLife();
      continue;
    }
    drawToilet(e);
  }
  // auto-fire
  fireCooldown--;
  if(targetEnemy && enemies.indexOf(targetEnemy)===-1){targetEnemy=null}
  if(!targetEnemy){
    // pick nearest as default
    var nearest=null,nd=Infinity;
    for(var n=0;n<enemies.length;n++){
      var de=enemies[n];
      var d=de.x-player.x;
      if(d>0&&d<nd){nd=d;nearest=de}
    }
    if(nearest)targetEnemy=nearest;
  }
  if(targetEnemy && fireCooldown<=0){
    fireShot(targetEnemy);
    fireCooldown=fireRate;
    // damage target on bullet impact (deferred via bullet life)
  }
  // update bullets
  for(var b=bullets.length-1;b>=0;b--){
    var bu=bullets[b];
    bu.life++;
    if(bu.life>=bu.maxLife){
      // hit
      if(bu.target && enemies.indexOf(bu.target)>-1){
        applyDamage(bu.target,dmg);
      }
      bullets.splice(b,1);
      continue;
    }
    drawBullet(bu);
  }
  // particles
  for(var p=particles.length-1;p>=0;p--){
    var pa=particles[p];
    pa.life--;
    pa.x+=pa.vx;
    pa.y+=pa.vy;
    if(pa.gravity)pa.vy+=pa.gravity;
    if(pa.life<=0){particles.splice(p,1);continue}
    X.globalAlpha=Math.min(1,pa.life/15);
    X.fillStyle=pa.c;
    X.beginPath();X.arc(pa.x,pa.y,pa.r,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
  }
  // coin drops
  for(var ci=coinDrops.length-1;ci>=0;ci--){
    var co=coinDrops[ci];
    co.life++;
    if(!co.collected){
      co.x+=co.vx;
      co.y+=co.vy;
      co.vy+=0.35;
      co.vx*=0.98;
      if(co.y>H-86){
        co.y=H-86;
        co.vy*=-0.4;
        co.vx*=0.6;
        if(Math.abs(co.vy)<0.5)co.vy=0;
      }
      co.sparkle=(co.sparkle+1)%20;
      if(co.life>50){
        // auto-collect
        co.collected=true;
      }
    } else {
      // fly to coin counter
      var tx=W*0.4,ty=20;
      co.x+=(tx-co.x)*0.15;
      co.y+=(ty-co.y)*0.15;
      if(Math.abs(co.x-tx)<10&&Math.abs(co.y-ty)<10){
        coins++;updHud();
        coinDrops.splice(ci,1);
        for(var s=0;s<4;s++){
          particles.push({x:tx,y:ty,vx:rnd(-2,2),vy:rnd(-2,2),life:14,r:2,c:'#ffd24f'});
        }
        continue;
      }
    }
    drawCoin(co);
  }
  // popups
  for(var pp=popups.length-1;pp>=0;pp--){
    var pop=popups[pp];
    pop.life--;
    pop.y+=pop.vy;
    if(pop.life<=0){popups.splice(pp,1);continue}
    X.globalAlpha=Math.min(1,pop.life/30);
    X.fillStyle=pop.c;
    X.font='bold 16px Arial';X.textAlign='center';
    X.strokeStyle='#000';X.lineWidth=3;
    X.strokeText(pop.text,pop.x,pop.y);
    X.fillText(pop.text,pop.x,pop.y);
    X.globalAlpha=1;
  }
  drawPlayer();
  if(playerFlash>0)playerFlash--;
  // damage flash overlay
  if(playerFlash>10){
    X.fillStyle='rgba(255,40,40,'+((playerFlash-10)/20)+')';
    X.fillRect(0,0,W,H);
  }
  X.restore();
  raf(loop);
}

// inputs
function getXY(ev){
  var t=ev.touches?ev.touches[0]:ev;
  var rect=C.getBoundingClientRect();
  return{x:t.clientX-rect.left,y:t.clientY-rect.top};
}

C.addEventListener('touchstart',function(ev){
  ev.preventDefault();
  if(!run)return;
  var p=getXY(ev);
  tapAt(p.x,p.y);
},{passive:false});

C.addEventListener('mousedown',function(ev){
  if(!run)return;
  var p=getXY(ev);
  tapAt(p.x,p.y);
});

document.getElementById('b1').addEventListener('touchend',function(e){e.preventDefault();startGame()});

document.getElementById('b2').addEventListener('touchend',function(e){e.preventDefault();hide(ov2);hide(ob2);startGame()});

document.getElementById('b3').addEventListener('touchend',function(e){e.preventDefault();startNextWave()});

window.addEventListener('resize',function(){sz();if(player)player.y=H-120});
sz();mkClouds();
bw1.textContent='Best Wave: '+bestWave;
})();
