/* --- THEMES --- */
function pickThemes(){
var out=[];
var pool=THEMES.slice();
for(var i=pool.length-1;i>0;i--){
var j=Math.floor(Math.random()*(i+1));
var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp;
}
for(var k=0;k<5;k++)out.push(pool[k]);
return out;
}

/* --- Color helpers --- */
function hexToRgb(h){
var m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
if(!m)return [128,128,128];
return [parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)];
}
function rgbToHsl(r,g,b){
r/=255;g/=255;b/=255;
var mx=Math.max(r,g,b),mn=Math.min(r,g,b);
var h,s,l=(mx+mn)/2;
if(mx===mn){h=0;s=0;}
else{
var d=mx-mn;
s=l>0.5?d/(2-mx-mn):d/(mx+mn);
switch(mx){
case r:h=(g-b)/d+(g<b?6:0);break;
case g:h=(b-r)/d+2;break;
case b:h=(r-g)/d+4;break;
}
h/=6;
}
return [h*360,s,l];
}
function colorHarmony(){
/* check coordination among top, bot, sho, acc colors */
var picks=[];
if(outfit.top!=null)picks.push(TOP[outfit.top].color);
if(outfit.bot!=null)picks.push(BOT[outfit.bot].color);
if(outfit.sho!=null)picks.push(SHO[outfit.sho].color);
if(outfit.acc!=null && outfit.acc!==0)picks.push(ACC[outfit.acc].color);
if(picks.length<2)return 0;
var hues=[],sats=[],lights=[];
for(var i=0;i<picks.length;i++){
var rgb=hexToRgb(picks[i]);
var hsl=rgbToHsl(rgb[0],rgb[1],rgb[2]);
hues.push(hsl[0]);sats.push(hsl[1]);lights.push(hsl[2]);
}
var bonus=0;
/* matching hues - similar within 25 degrees */
var pairs=0,close=0;
for(var a=0;a<hues.length;a++){
for(var b=a+1;b<hues.length;b++){
pairs++;
var diff=Math.abs(hues[a]-hues[b]);
if(diff>180)diff=360-diff;
if(diff<25 || (diff>=145 && diff<=215) /* complementary */)close++;
if(sats[a]<.18 && sats[b]<.18)close+=.5; /* both neutral */
}
}
if(pairs>0){
var ratio=close/pairs;
bonus=Math.round(ratio*20);
}
return Math.min(20,bonus);
}

if(outfit.bot!=null)parts.push(BOT[outfit.bot].style);
if(outfit.sho!=null)parts.push(SHO[outfit.sho].style);
if(outfit.acc!=null && outfit.acc!==0)parts.push(ACC[outfit.acc].style);
for(var i=0;i<parts.length;i++){
var st=parts[i];
if(theme.pref[st])s+=theme.pref[st];
if(theme.bad[st])s+=theme.bad[st];
}
/* base offset so even bad outfits show some score */
s+=20;
if(s<0)s=0;
if(s>80)s=80;
return s;
}

function getFeedback(themeScore,colorBonus){
var total=themeScore+colorBonus;
if(total>=85)return 'Absolutely stunning!';
if(total>=70)return 'Looking fabulous!';
if(total>=55)return 'Solid style choice.';
if(total>=40)return 'Not bad, could refine.';
if(total>=25)return 'Hmm, off-theme...';
return 'Yikes! Wrong vibe.';
}

/* --- Render character + outfit --- */
function drawChar(){
ctx.clearRect(0,0,W,H);
/* backdrop spotlight */
var cx=W/2,cy=H*0.52;
var grad=ctx.createRadialGradient(cx,cy,20,cx,cy,Math.max(W,H)*0.6);
grad.addColorStop(0,'rgba(255,200,235,0.18)');
grad.addColorStop(1,'rgba(0,0,0,0)');
ctx.fillStyle=grad;
ctx.fillRect(0,0,W,H);

var scale=Math.min(W,H)/360;
if(scale<0.6)scale=0.6;
var bx=cx,by=cy;

/* draw base silhouette */
drawSilhouette(bx,by,scale);
/* layer outfit */
if(outfit.top!=null)drawTop(bx,by,scale,TOP[outfit.top]);
if(outfit.bot!=null)drawBottom(bx,by,scale,BOT[outfit.bot]);
if(outfit.sho!=null)drawShoes(bx,by,scale,SHO[outfit.sho]);
if(outfit.hair!=null)drawHair(bx,by,scale,HAIR[outfit.hair]);
if(outfit.acc!=null && outfit.acc!==0)drawAccessory(bx,by,scale,ACC[outfit.acc]);

/* sparkles */
drawSparkles();
/* confetti */
drawConfetti();
}

function drawSilhouette(cx,cy,sc){
var skin='#f4d2b8';
var dark='#000';
ctx.save();
ctx.translate(cx,cy-130*sc);
/* head */
ctx.fillStyle=skin;
ctx.strokeStyle=dark;ctx.lineWidth=2;
ctx.beginPath();ctx.ellipse(0,0,22*sc,26*sc,0,0,Math.PI*2);ctx.fill();ctx.stroke();
/* face features (subtle) */
ctx.fillStyle='rgba(50,30,40,0.7)';
ctx.beginPath();ctx.ellipse(-7*sc,-2*sc,1.5*sc,2*sc,0,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(7*sc,-2*sc,1.5*sc,2*sc,0,0,Math.PI*2);ctx.fill();
ctx.strokeStyle='rgba(180,80,120,0.7)';ctx.lineWidth=1.5;
ctx.beginPath();ctx.arc(0,8*sc,4*sc,0.2,Math.PI-0.2);ctx.stroke();
/* neck */
ctx.fillStyle=skin;ctx.strokeStyle=dark;ctx.lineWidth=2;
ctx.beginPath();ctx.rect(-7*sc,22*sc,14*sc,12*sc);ctx.fill();ctx.stroke();
/* torso (base under top) */
ctx.fillStyle=skin;
ctx.beginPath();
var ty=34*sc;
ctx.moveTo(-25*sc,ty);
ctx.quadraticCurveTo(-30*sc,55*sc,-22*sc,90*sc);
ctx.lineTo(-18*sc,120*sc);
ctx.lineTo(18*sc,120*sc);
ctx.quadraticCurveTo(30*sc,55*sc,25*sc,ty);
ctx.closePath();
ctx.fill();ctx.stroke();
/* arms */
ctx.fillStyle=skin;
ctx.beginPath();
ctx.moveTo(-25*sc,38*sc);
ctx.quadraticCurveTo(-40*sc,55*sc,-38*sc,95*sc);
ctx.quadraticCurveTo(-36*sc,120*sc,-28*sc,140*sc);
ctx.lineTo(-22*sc,140*sc);
ctx.quadraticCurveTo(-28*sc,115*sc,-30*sc,90*sc);
ctx.quadraticCurveTo(-30*sc,65*sc,-22*sc,42*sc);
ctx.closePath();ctx.fill();ctx.stroke();
ctx.beginPath();
ctx.moveTo(25*sc,38*sc);
ctx.quadraticCurveTo(40*sc,55*sc,38*sc,95*sc);
ctx.quadraticCurveTo(36*sc,120*sc,28*sc,140*sc);
ctx.lineTo(22*sc,140*sc);
ctx.quadraticCurveTo(28*sc,115*sc,30*sc,90*sc);
ctx.quadraticCurveTo(30*sc,65*sc,22*sc,42*sc);
ctx.closePath();ctx.fill();ctx.stroke();
/* legs (base under bottom) */
ctx.fillStyle=skin;
ctx.beginPath();
ctx.rect(-18*sc,120*sc,15*sc,90*sc);
ctx.fill();ctx.stroke();
ctx.beginPath();
ctx.rect(3*sc,120*sc,15*sc,90*sc);
ctx.fill();ctx.stroke();
ctx.restore();
}

function drawHair(cx,cy,sc,h){
ctx.save();
ctx.translate(cx,cy-130*sc);
ctx.fillStyle=h.color;
ctx.strokeStyle='#000';ctx.lineWidth=2;
/* hair cap with flowing strands behind shoulders */
ctx.beginPath();
ctx.moveTo(-22*sc,-8*sc);
ctx.quadraticCurveTo(-30*sc,-25*sc,-14*sc,-32*sc);
ctx.quadraticCurveTo(0,-38*sc,14*sc,-32*sc);
ctx.quadraticCurveTo(30*sc,-25*sc,22*sc,-8*sc);
ctx.lineTo(22*sc,8*sc);
ctx.quadraticCurveTo(20*sc,5*sc,16*sc,-4*sc);
ctx.lineTo(-16*sc,-4*sc);
ctx.quadraticCurveTo(-20*sc,5*sc,-22*sc,8*sc);
ctx.closePath();
ctx.fill();ctx.stroke();
/* side flow */
ctx.beginPath();
ctx.moveTo(-22*sc,8*sc);
ctx.quadraticCurveTo(-32*sc,40*sc,-26*sc,70*sc);
ctx.lineTo(-20*sc,70*sc);
ctx.quadraticCurveTo(-22*sc,40*sc,-18*sc,12*sc);
ctx.closePath();
ctx.fill();ctx.stroke();
ctx.beginPath();
ctx.moveTo(22*sc,8*sc);
ctx.quadraticCurveTo(32*sc,40*sc,26*sc,70*sc);
ctx.lineTo(20*sc,70*sc);
ctx.quadraticCurveTo(22*sc,40*sc,18*sc,12*sc);
ctx.closePath();
ctx.fill();ctx.stroke();
ctx.restore();
}

function drawTop(cx,cy,sc,t){
ctx.save();
ctx.translate(cx,cy-130*sc);
ctx.fillStyle=t.color;
ctx.strokeStyle='#000';ctx.lineWidth=2;
var s=t.style;
if(s==='gown'){
/* long flowing dress */
ctx.beginPath();
ctx.moveTo(-26*sc,38*sc);
ctx.quadraticCurveTo(-30*sc,60*sc,-26*sc,90*sc);
ctx.lineTo(-44*sc,210*sc);
ctx.lineTo(44*sc,210*sc);
ctx.quadraticCurveTo(30*sc,90*sc,26*sc,38*sc);
ctx.lineTo(15*sc,34*sc);
ctx.lineTo(-15*sc,34*sc);
ctx.closePath();
ctx.fill();ctx.stroke();
/* sparkle accent */
ctx.fillStyle='rgba(255,255,255,0.5)';
ctx.beginPath();ctx.ellipse(-10*sc,55*sc,3*sc,2*sc,0,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(8*sc,75*sc,3*sc,2*sc,0,0,Math.PI*2);ctx.fill();
}else if(s==='jacket'){
/* suit jacket: torso + lapels */
ctx.beginPath();
ctx.moveTo(-28*sc,36*sc);
ctx.quadraticCurveTo(-32*sc,55*sc,-26*sc,95*sc);
ctx.lineTo(-22*sc,125*sc);
ctx.lineTo(22*sc,125*sc);
ctx.quadraticCurveTo(32*sc,55*sc,28*sc,36*sc);
ctx.lineTo(15*sc,34*sc);
ctx.lineTo(-15*sc,34*sc);
ctx.closePath();ctx.fill();ctx.stroke();
/* collar V */
ctx.fillStyle='rgba(255,255,255,0.18)';
ctx.beginPath();
ctx.moveTo(-12*sc,34*sc);ctx.lineTo(0,75*sc);ctx.lineTo(12*sc,34*sc);ctx.closePath();ctx.fill();ctx.stroke();
/* sleeves */
ctx.fillStyle=t.color;
drawSleeve(sc,-1);drawSleeve(sc,1);
/* button */
ctx.fillStyle='#ffd24a';
ctx.beginPath();ctx.arc(0,90*sc,2*sc,0,Math.PI*2);ctx.fill();
}else if(s==='blouse'){
ctx.beginPath();
ctx.moveTo(-26*sc,36*sc);
ctx.quadraticCurveTo(-30*sc,55*sc,-25*sc,90*sc);
ctx.lineTo(-22*sc,118*sc);
ctx.lineTo(22*sc,118*sc);
ctx.quadraticCurveTo(30*sc,55*sc,26*sc,36*sc);
ctx.lineTo(14*sc,34*sc);
ctx.lineTo(-14*sc,34*sc);
ctx.closePath();ctx.fill();ctx.stroke();
drawSleeve(sc,-1);drawSleeve(sc,1);
/* ruffle line */
ctx.strokeStyle='rgba(255,255,255,0.4)';
ctx.beginPath();ctx.moveTo(0,40*sc);ctx.lineTo(0,115*sc);ctx.stroke();
}else if(s==='hoodie'){
ctx.beginPath();
ctx.moveTo(-30*sc,38*sc);
ctx.quadraticCurveTo(-34*sc,55*sc,-28*sc,95*sc);
ctx.lineTo(-24*sc,122*sc);
ctx.lineTo(24*sc,122*sc);
ctx.quadraticCurveTo(34*sc,55*sc,30*sc,38*sc);
ctx.lineTo(18*sc,34*sc);
ctx.lineTo(-18*sc,34*sc);
ctx.closePath();ctx.fill();ctx.stroke();
/* hood */
ctx.beginPath();
ctx.moveTo(-18*sc,34*sc);
ctx.quadraticCurveTo(-22*sc,18*sc,-10*sc,12*sc);
ctx.quadraticCurveTo(0,8*sc,10*sc,12*sc);
ctx.quadraticCurveTo(22*sc,18*sc,18*sc,34*sc);
ctx.closePath();ctx.fill();ctx.stroke();
/* pocket */
ctx.strokeStyle='rgba(0,0,0,0.4)';
ctx.beginPath();ctx.moveTo(-12*sc,90*sc);ctx.lineTo(12*sc,90*sc);ctx.stroke();
drawSleeve(sc,-1);drawSleeve(sc,1);
}else if(s==='flannel'){
ctx.beginPath();
ctx.moveTo(-28*sc,36*sc);
ctx.quadraticCurveTo(-32*sc,55*sc,-26*sc,95*sc);
ctx.lineTo(-23*sc,120*sc);
ctx.lineTo(23*sc,120*sc);
ctx.quadraticCurveTo(32*sc,55*sc,28*sc,36*sc);
ctx.lineTo(15*sc,34*sc);
ctx.lineTo(-15*sc,34*sc);
ctx.closePath();ctx.fill();ctx.stroke();
drawSleeve(sc,-1);drawSleeve(sc,1);
/* check pattern */
ctx.strokeStyle='rgba(0,0,0,0.35)';
ctx.lineWidth=1;
for(var i=-25;i<=25;i+=8){
ctx.beginPath();ctx.moveTo(i*sc,38*sc);ctx.lineTo(i*sc,118*sc);ctx.stroke();
}
for(var j=40;j<=115;j+=10){
ctx.beginPath();ctx.moveTo(-26*sc,j*sc);ctx.lineTo(26*sc,j*sc);ctx.stroke();
}
}else if(s==='tank'){
ctx.beginPath();
ctx.moveTo(-22*sc,42*sc);
ctx.lineTo(-22*sc,118*sc);
ctx.lineTo(22*sc,118*sc);
ctx.lineTo(22*sc,42*sc);
ctx.lineTo(12*sc,38*sc);
ctx.lineTo(8*sc,42*sc);
ctx.lineTo(-8*sc,42*sc);
ctx.lineTo(-12*sc,38*sc);
ctx.closePath();ctx.fill();ctx.stroke();
}else if(s==='sport'){
ctx.beginPath();
ctx.moveTo(-22*sc,40*sc);
ctx.lineTo(-22*sc,108*sc);
ctx.lineTo(22*sc,108*sc);
ctx.lineTo(22*sc,40*sc);
ctx.lineTo(10*sc,36*sc);
ctx.lineTo(-10*sc,36*sc);
ctx.closePath();ctx.fill();ctx.stroke();
/* stripe */
ctx.fillStyle='rgba(255,255,255,0.55)';
ctx.fillRect(-22*sc,80*sc,44*sc,4*sc);
}else{ /* tshirt default */
ctx.beginPath();
ctx.moveTo(-26*sc,40*sc);
ctx.quadraticCurveTo(-30*sc,55*sc,-25*sc,95*sc);
ctx.lineTo(-22*sc,118*sc);
ctx.lineTo(22*sc,118*sc);
ctx.quadraticCurveTo(30*sc,55*sc,26*sc,40*sc);
ctx.lineTo(14*sc,36*sc);
ctx.lineTo(-14*sc,36*sc);
ctx.closePath();ctx.fill();ctx.stroke();
drawSleeve(sc,-1);drawSleeve(sc,1);
}
ctx.restore();
}

function drawSleeve(sc,side){
ctx.beginPath();
var x=side*22*sc;
var sx=side*32*sc;
ctx.moveTo(x,38*sc);
ctx.quadraticCurveTo(sx+side*4*sc,55*sc,sx+side*2*sc,75*sc);
ctx.lineTo(sx-side*4*sc,72*sc);
ctx.quadraticCurveTo(x-side*2*sc,55*sc,x,42*sc);
ctx.closePath();
ctx.fill();ctx.stroke();
}

function drawBottom(cx,cy,sc,b){
ctx.save();
ctx.translate(cx,cy-130*sc);
ctx.fillStyle=b.color;
ctx.strokeStyle='#000';ctx.lineWidth=2;
var s=b.style;
if(s==='skirt'){
ctx.beginPath();
ctx.moveTo(-22*sc,118*sc);

ctx.closePath();ctx.fill();ctx.stroke();

ctx.closePath();ctx.fill();ctx.stroke();
ctx.beginPath();
ctx.moveTo(2*sc,118*sc);ctx.lineTo(4*sc,205*sc);ctx.lineTo(20*sc,205*sc);ctx.lineTo(22*sc,118*sc);

ctx.beginPath();ctx.moveTo(18*sc,128*sc);ctx.lineTo(10*sc,140*sc);ctx.stroke();

}

function drawShoes(cx,cy,sc,sh){
ctx.save();
ctx.translate(cx,cy-130*sc);
ctx.fillStyle=sh.color;
ctx.strokeStyle='#000';ctx.lineWidth=2;
var s=sh.style;
var leftX=-12*sc,rightX=12*sc;
var y=210*sc;
if(s==='heels'){
drawHeel(leftX,y,sc,sh.color);drawHeel(rightX,y,sc,sh.color);
}else if(s==='boots'){
ctx.fillStyle=sh.color;
ctx.beginPath();ctx.rect(leftX-10*sc,y-25*sc,20*sc,30*sc);ctx.fill();ctx.stroke();
ctx.beginPath();ctx.rect(rightX-10*sc,y-25*sc,20*sc,30*sc);ctx.fill();ctx.stroke();

ctx.fillRect(rightX-10*sc,y+2*sc,20*sc,3*sc);
}else if(s==='flats'){
ctx.beginPath();ctx.ellipse(leftX,y,12*sc,6*sc,0,0,Math.PI*2);ctx.fill();ctx.stroke();
ctx.beginPath();ctx.ellipse(rightX,y,12*sc,6*sc,0,0,Math.PI*2);ctx.fill();ctx.stroke();
}else if(s==='sandals'){
ctx.fillStyle=sh.color;
ctx.beginPath();ctx.ellipse(leftX,y+4*sc,13*sc,5*sc,0,0,Math.PI*2);ctx.fill();ctx.stroke();
ctx.beginPath();ctx.ellipse(rightX,y+4*sc,13*sc,5*sc,0,0,Math.PI*2);ctx.fill();ctx.stroke();
ctx.strokeStyle=sh.color;ctx.lineWidth=2.5;
ctx.beginPath();ctx.moveTo(leftX-6*sc,y);ctx.lineTo(leftX+6*sc,y);ctx.stroke();
ctx.beginPath();ctx.moveTo(rightX-6*sc,y);ctx.lineTo(rightX+6*sc,y);ctx.stroke();
}else if(s==='trainers'){
ctx.fillStyle=sh.color;
ctx.beginPath();ctx.roundRect?ctx.roundRect(leftX-13*sc,y-6*sc,26*sc,14*sc,5*sc):ctx.rect(leftX-13*sc,y-6*sc,26*sc,14*sc);ctx.fill();ctx.stroke();
ctx.beginPath();ctx.roundRect?ctx.roundRect(rightX-13*sc,y-6*sc,26*sc,14*sc,5*sc):ctx.rect(rightX-13*sc,y-6*sc,26*sc,14*sc);ctx.fill();ctx.stroke();
ctx.fillStyle='rgba(255,255,255,0.6)';
ctx.fillRect(leftX-12*sc,y+2*sc,22*sc,2*sc);
ctx.fillRect(rightX-12*sc,y+2*sc,22*sc,2*sc);
}else{ /* sneakers */
ctx.fillStyle=sh.color;
ctx.beginPath();ctx.roundRect?ctx.roundRect(leftX-13*sc,y-6*sc,26*sc,14*sc,5*sc):ctx.rect(leftX-13*sc,y-6*sc,26*sc,14*sc);ctx.fill();ctx.stroke();
ctx.beginPath();ctx.roundRect?ctx.roundRect(rightX-13*sc,y-6*sc,26*sc,14*sc,5*sc):ctx.rect(rightX-13*sc,y-6*sc,26*sc,14*sc);ctx.fill();ctx.stroke();
ctx.fillStyle='rgba(0,0,0,0.5)';
ctx.beginPath();ctx.arc(leftX,y,2*sc,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(rightX,y,2*sc,0,Math.PI*2);ctx.fill();

ctx.restore();

/* --- Sparkles --- */
function spawnSparkles(cat){
var cx=W/2,cy=H*0.52;
var sc=Math.min(W,H)/360;
if(sc<0.6)sc=0.6;
var px=cx,py=cy;
if(cat==='hair'){py=cy-130*sc-15*sc;}
else if(cat==='top'){py=cy-130*sc+78*sc;}
else if(cat==='bot'){py=cy-130*sc+160*sc;}
else if(cat==='sho'){py=cy-130*sc+210*sc;}
else if(cat==='acc'){py=cy-130*sc;}
for(var i=0;i<14;i++){
var ang=Math.random()*Math.PI*2;
var spd=40+Math.random()*100;
sparkles.push({
x:px+(Math.random()*60-30),
y:py+(Math.random()*40-20),
vx:Math.cos(ang)*spd,
vy:Math.sin(ang)*spd-30,
life:1,
size:2+Math.random()*3
});
}
}
function drawSparkles(){
for(var i=0;i<sparkles.length;i++){
var s=sparkles[i];
var alpha=s.life;
ctx.save();
ctx.globalAlpha=alpha;
ctx.fillStyle='#fff7c0';
ctx.shadowColor='#ffd24a';
ctx.shadowBlur=8;
ctx.beginPath();
var sz=s.size*alpha;
ctx.moveTo(s.x,s.y-sz);
ctx.lineTo(s.x+sz*.3,s.y-sz*.3);
ctx.lineTo(s.x+sz,s.y);
ctx.lineTo(s.x+sz*.3,s.y+sz*.3);
ctx.lineTo(s.x,s.y+sz);
ctx.lineTo(s.x-sz*.3,s.y+sz*.3);
ctx.lineTo(s.x-sz,s.y);
ctx.lineTo(s.x-sz*.3,s.y-sz*.3);
ctx.closePath();
ctx.fill();
ctx.restore();
}
}

/* --- Confetti --- */
function spawnConfetti(){
var cols=['#ff66b2','#ffd24a','#9b59ff','#3a8dde','#2ecc71','#fff7c0'];
for(var i=0;i<60;i++){
confetti.push({
x:W/2+(Math.random()-0.5)*40,
y:H*0.3,
vx:(Math.random()-0.5)*220,
vy:-180-Math.random()*180,
g:280,
rot:Math.random()*Math.PI*2,
vr:(Math.random()-0.5)*8,
col:cols[Math.floor(Math.random()*cols.length)],
life:1.4
});
}
}
function drawConfetti(){
for(var i=0;i<confetti.length;i++){
var c=confetti[i];
ctx.save();
ctx.translate(c.x,c.y);
ctx.rotate(c.rot);
ctx.fillStyle=c.col;
ctx.globalAlpha=Math.max(0,Math.min(1,c.life));
ctx.fillRect(-4,-2,8,4);
ctx.restore();
}
}

/* --- ANIMATION LOOP --- */
function tick(t){
if(!lastT)lastT=t;
var dt=Math.min(0.05,(t-lastT)/1000);
lastT=t;
/* update sparkles */
for(var i=sparkles.length-1;i>=0;i--){
var s=sparkles[i];
s.x+=s.vx*dt;s.y+=s.vy*dt;
s.vy+=80*dt;
s.life-=dt*1.4;
if(s.life<=0)sparkles.splice(i,1);
}
/* update confetti */
for(var j=confetti.length-1;j>=0;j--){
var c=confetti[j];
c.x+=c.vx*dt;c.y+=c.vy*dt;
c.vy+=c.g*dt;
c.rot+=c.vr*dt;
c.life-=dt*0.5;
if(c.life<=0||c.y>H+50)confetti.splice(j,1);
}
drawChar();
animId=requestAnimationFrame(tick);
}

/* --- UI --- */
function buildTabs(){
tabsEl.innerHTML='';
for(var i=0;i<CATS.length;i++){
var btn=document.createElement('button');
btn.className='tab'+(i===activeTab?' active':'');
btn.textContent=CATS[i].label;
btn.dataset.idx=i;
btn.addEventListener('click',(function(idx){return function(){activeTab=idx;buildTabs();buildItems();}}(i)));
tabsEl.appendChild(btn);
}
}

function buildItems(){
itemsEl.innerHTML='';
var cat=CATS[activeTab];
var data=cat.data;
var key=cat.key;
for(var i=0;i<data.length;i++){
var it=data[i];
var div=document.createElement('div');
div.className='item';
if(outfit[key]===i)div.className+=' selected';
div.innerHTML=renderItemSwatch(cat.key,it);
div.dataset.idx=i;
div.addEventListener('click',(function(idx,k){return function(){
outfit[k]=idx;
spawnSparkles(k);
buildItems();
}}(i,key)));
itemsEl.appendChild(div);
}
}

/* --- ROUND/GAME flow --- */
function startGame(){
roundIdx=0;totalScore=0;
roundThemes=pickThemes();
sparkles=[];confetti=[];
beginRound();
hide(ob1,ov1);
}

function beginRound(){
outfit={hair:null,top:null,bot:null,sho:null,acc:0};
activeTab=1;
buildTabs();buildItems();
var t=roundThemes[roundIdx];
hThm.textContent=t.name;
hIcn.textContent=t.icon;
hRnd.textContent=(roundIdx+1)+'/5';
hScr.textContent=totalScore;
}

function trySubmit(){
/* require at least top, bot, sho, hair */
if(outfit.hair==null||outfit.top==null||outfit.bot==null||outfit.sho==null){
flashSubmit();
return;
}
var theme=roundThemes[roundIdx];
var themeScore=scoreOutfit(theme);
var colorBonus=colorHarmony();
var roundTotal=themeScore+colorBonus;
totalScore+=roundTotal;
hScr.textContent=totalScore;

/* show round result */
rTitle.textContent='ROUND '+(roundIdx+1)+' / 5';
rThemeVal.textContent=themeScore;
rColorVal.textContent='+'+colorBonus;
rTotalVal.textContent=roundTotal;
rFb.textContent=getFeedback(themeScore,colorBonus);
var stars=Math.round(roundTotal/20);
if(stars>5)stars=5;if(stars<0)stars=0;
var s='';
for(var i=0;i<5;i++)s+=(i<stars?'★':'☆');
rStars.textContent=s;
rStars.style.color=stars>=4?'#ffd24a':(stars>=2?'#ff9eb5':'#a087b3');

show(ob2,ov2);
if(roundTotal>=85)spawnConfetti();
}

function flashSubmit(){
bSubmit.style.background='#bb3030';
setTimeout(function(){bSubmit.style.background='';},300);
}

function nextRound(){
hide(ob2,ov2);
roundIdx++;
if(roundIdx>=5){
endGame();
}else{
beginRound();
}
}

function endGame(){
fScore.textContent=totalScore+' / 500';
var stars=Math.round(totalScore/100);
if(stars>5)stars=5;if(stars<0)stars=0;
var s='';
for(var i=0;i<5;i++)s+=(i<stars?'★':'☆');
fStars.textContent=s;
fStars.style.color=stars>=4?'#ffd24a':(stars>=2?'#ff9eb5':'#a087b3');
if(stars>=5)fFb.textContent='STYLE LEGEND! Iconic looks all round.';
else if(stars>=4)fFb.textContent='Trendsetter! You nailed the vibes.';
else if(stars>=3)fFb.textContent='Stylish work overall.';
else if(stars>=2)fFb.textContent='Some hits, some misses.';
else fFb.textContent='Time to study fashion mags.';
saveBest(totalScore);
updateBestText();
if(stars>=4)spawnConfetti();
show(ob3,ov3);
}

function show(b,o){b.classList.remove('hidden');o.classList.remove('hidden');}
function hide(b,o){b.classList.add('hidden');o.classList.add('hidden');}

bPlay.addEventListener('click',function(){startGame();});
bNext.addEventListener('click',function(){nextRound();});
bAgain.addEventListener('click',function(){
hide(ob3,ov3);
startGame();
});
bSubmit.addEventListener('click',trySubmit);
bClear.addEventListener('click',function(){
outfit={hair:null,top:null,bot:null,sho:null,acc:0};
buildItems();
});

/* --- INIT --- */
function init(){
resize();
buildTabs();
buildItems();
updateBestText();
animId=requestAnimationFrame(tick);
}
init();
})();
</script>
