<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="index, follow">
  <meta name="description" content="" id="metaDesc">
  <meta property="og:title" content="" id="ogTitle">
  <meta property="og:description" content="" id="ogDesc">
  <meta property="og:type" content="website">
  <title id="pageTitle">Loading Game...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <!-- Google Ad Placeholder -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

  <script type="application/ld+json" id="jsonLd">
  {"@context":"https://schema.org","@type":"VideoGame","name":"","description":""}
  </script>
</head>
<body>

  <div class="site-wrap">
    <div class="game-page">

      <!-- BACK NAV -->
      <header class="game-topbar">
        <a href="index.html" class="back-btn">&#8592; Games</a>
        <span class="game-breadcrumb" id="breadcrumb">Loading...</span>
      </header>

      <!-- AD SLOT: Pre-game -->
      <div class="ad-slot ad-pre">
        <div class="ad-inner"><span class="ad-text">Advertisement</span></div>
      </div>

      <!-- GAME IFRAME -->
      <div class="game-frame-container" id="gameFrameContainer">
        <div class="game-frame-wrapper" id="gameFrameWrapper">
          <div class="game-loading" id="gameLoading">
            <div class="spinner"></div>
            <p>Loading game...</p>
          </div>
        </div>
      </div>

      <!-- GAME TITLE -->
      <div class="game-info-bar">
        <h1 id="gameTitle">Loading...</h1>
        <div class="game-meta">
          <span class="stars" id="gameStars"></span>
          <span class="cat-badge" id="gameBadge"></span>
        </div>
      </div>

      <!-- CONTROLS -->
      <div class="game-controls">
        <button class="ctrl-btn ctrl-fs" id="fullscreenBtn">⛶ Full Screen</button>
        <button class="ctrl-btn ctrl-reload" id="reloadBtn">🔄 Reload</button>
      </div>

      <!-- AD SLOT: Below controls -->
      <div class="ad-slot ad-below">
        <div class="ad-inner"><span class="ad-text">Advertisement</span></div>
      </div>

      <!-- HOW TO PLAY -->
      <div class="how-to-play">
        <h3>📖 How to Play</h3>
        <p id="gameDescription">Loading...</p>
        <div class="tag-row" id="gameTags"></div>
      </div>

      <!-- AD SLOT: Mid-page -->
      <div class="ad-slot ad-mid">
        <div class="ad-inner"><span class="ad-text">Advertisement</span></div>
      </div>

      <!-- MORE GAMES -->
      <section class="more-games">
        <h3>🎯 You May Also Like</h3>
        <div class="game-grid" id="relatedGrid"></div>
      </section>

      <!-- PLAY MORE -->
      <div class="play-more-wrap">
        <a href="index.html" class="play-more-btn">🎮 Play More Games</a>
      </div>

      <!-- AD SLOT: Bottom -->
      <div class="ad-slot ad-bottom">
        <div class="ad-inner"><span class="ad-text">Advertisement</span></div>
      </div>

    </div>

    <footer class="site-footer">
      <a href="privacy.html">Privacy Policy</a>
      <span class="dot">·</span>
      <a href="terms.html">Terms</a>
      <span class="dot">·</span>
      <a href="contact.html">Contact</a>
      <p class="copy">&copy; 2026 Fun5Games. All rights reserved.</p>
    </footer>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
